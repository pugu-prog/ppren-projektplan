<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PPREN Fachgespréich</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
  window.addEventListener("error", function (e) {
    document.getElementById("root").innerHTML =
      '<div style="padding:40px;font-family:sans-serif;color:#8a2b1f;white-space:pre-wrap;">' +
      '<h2 style="margin-top:0;">Fehler beim Laden</h2>' +
      (e.message || "Unbekannter Fehler") +
      (e.filename ? "\n\nDatei: " + e.filename + " Zeile " + e.lineno : "") +
      "</div>";
  });
</script>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzfyThho8MevoyfSz7NsQ1YxZJO4E-f61GYYzqZyHACIHzxR3bm7SHCwVUkCBJrAEvJ/exec";

const SCHUELER = [
  { id: "lea_muller", name: "Léa Muller", klasse: "1GSE" },
  { id: "ben_weber", name: "Ben Weber", klasse: "2GSE" },
  { id: "noah_schmit", name: "Noah Schmit", klasse: "1GSE" },
  { id: "mia_reuter", name: "Mia Reuter", klasse: "2GSE" },
  { id: "tom_klein", name: "Tom Klein", klasse: "2GSE" },
];
const PERIODEN_2GSE = ["Trimester 1", "Trimester 2", "Trimester 3"];
const PERIODEN_1GSE = ["Semester 1", "Semester 2"];

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function leerFroen(variante) {
  const anzuel = variante === "B" ? 4 : 5;
  const punkteMax = variante === "B" ? 7.5 : 6;
  return Array.from({ length: anzuel }, () => ({ id: uid(), frage: "", punkte: "", max: punkteMax }));
}

function formatZeit(sek) {
  const m = Math.floor(Math.abs(sek) / 60);
  const s = Math.abs(sek) % 60;
  return `${sek < 0 ? "-" : ""}${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}

function Timer() {
  const [phase, setPhase] = useState("idle"); // idle | vorbereitung | gespraech
  const [sek, setSek] = useState(5 * 60);
  const intervalRef = useRef(null);

  useEffect(() => {
    if (phase === "idle") return;
    intervalRef.current = setInterval(() => setSek((s) => s - 1), 1000);
    return () => clearInterval(intervalRef.current);
  }, [phase]);

  const start = (p, startSek) => { setPhase(p); setSek(startSek); };
  const stop = () => { setPhase("idle"); clearInterval(intervalRef.current); };

  return (
    <div className="timer-box">
      <div className={`timer-zeit ${sek < 0 ? "timer-negativ" : ""}`}>{formatZeit(sek)}</div>
      <div className="timer-label">
        {phase === "idle" && "Timer bereet"}
        {phase === "vorbereitung" && "⏳ Virbereedungszäit (5 Min.)"}
        {phase === "gespraech" && "🗣️ Fachgespréich (20 Min., ~4 Min./Fro)"}
      </div>
      <div className="timer-btns">
        <button className="btn-gen" onClick={() => start("vorbereitung", 5 * 60)}>5 Min. Virbereedung starten</button>
        <button className="btn-gen" onClick={() => start("gespraech", 20 * 60)}>20 Min. Gespréich starten</button>
        {phase !== "idle" && <button className="btn-gen btn-stop" onClick={stop}>Stopp</button>}
      </div>
    </div>
  );
}

function App() {
  const [schuelerId, setSchuelerId] = useState("");
  const [periode, setPeriode] = useState("");
  const [variante, setVariante] = useState("A");
  const [datum, setDatum] = useState(new Date().toISOString().slice(0, 10));
  const [froen, setFroen] = useState(leerFroen("A"));
  const [reflexionAktiv, setReflexionAktiv] = useState(false);
  const [reflexionPunkte, setReflexionPunkte] = useState("");
  const [notiz, setNotiz] = useState("");
  const [bisherig, setBisherig] = useState([]);
  const [loading, setLoading] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [toast, setToast] = useState(null);
  const [error, setError] = useState(null);

  const currentSchueler = SCHUELER.find((s) => s.id === schuelerId);
  const istGSE2 = currentSchueler?.klasse === "2GSE";
  const perioden = istGSE2 ? PERIODEN_2GSE : PERIODEN_1GSE;

  const lade = () => {
    if (!currentSchueler) return;
    setLoading(true);
    fetch(WEB_APP_URL)
      .then((res) => res.json())
      .then((data) => setBisherig((data.fachgespraeche || []).filter((f) => f.Schüler === currentSchueler.name)))
      .catch(() => setError("Konnte Historique net lueden."))
      .finally(() => setLoading(false));
  };
  useEffect(() => { if (schuelerId) lade(); }, [schuelerId]);

  const varianteWaehlen = (v) => {
    setVariante(v);
    setFroen(leerFroen(v));
  };

  const updateFro = (id, patch) => setFroen((fs) => fs.map((f) => (f.id === id ? { ...f, ...patch } : f)));

  const summe = useMemo(() => froen.reduce((s, f) => s + (parseFloat(f.punkte) || 0), 0), [froen]);
  const gesamt = summe + (reflexionAktiv ? (parseFloat(reflexionPunkte) || 0) : 0);
  const maxGesamt = 30 + (reflexionAktiv ? 10 : 0);

  const canSubmit = schuelerId && periode && froen.every((f) => f.frage.trim() && f.punkte !== "");

  const speicheren = async () => {
    if (!canSubmit) return;
    setSyncing(true);
    setError(null);
    try {
      const res = await fetch(WEB_APP_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({
          typ: "fachgespraech",
          schueler: currentSchueler.name,
          klasse: currentSchueler.klasse,
          periode, datum, variante,
          froen: froen.map(({ frage, punkte, max }) => ({ frage, punkte: Number(punkte) || 0, max })),
          reflexionAktiv, reflexionPunkte,
          notiz,
        }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "Onbekannte Feeler");
      setToast("Fachgespréich gespäichert.");
      setFroen(leerFroen(variante));
      setNotiz("");
      lade();
    } catch (e) {
      setError("Konnte net späicheren: " + e.message);
    } finally {
      setSyncing(false);
      setTimeout(() => setToast(null), 3000);
    }
  };

  return (
    <div className="wrap">
      <header className="topbar">
        <div className="brand">
          <span className="brand-mark">PPREN</span>
          <span className="brand-sub">Fachgespréich · Sciences Environnementales</span>
        </div>
      </header>

      <main className="content">
        <section className="card">
          <h2>1. Schüler/-in & Periode</h2>
          <div className="grid2">
            <label className="field">
              <span className="field-label">Schüler/-in</span>
              <select className="select" value={schuelerId} onChange={(e) => { setSchuelerId(e.target.value); setPeriode(""); }}>
                <option value="">– auswählen –</option>
                {SCHUELER.map((s) => <option key={s.id} value={s.id}>{s.name} ({s.klasse})</option>)}
              </select>
            </label>
            <label className="field">
              <span className="field-label">Periode</span>
              <select className="select" value={periode} onChange={(e) => setPeriode(e.target.value)} disabled={!schuelerId}>
                <option value="">– auswählen –</option>
                {perioden.map((p) => <option key={p} value={p}>{p}</option>)}
              </select>
            </label>
            <label className="field">
              <span className="field-label">Datum</span>
              <input type="date" className="input" value={datum} onChange={(e) => setDatum(e.target.value)} />
            </label>
          </div>
        </section>

        {schuelerId && periode && (
          <>
            <section className="card">
              <h2>2. Timer</h2>
              <p className="hint">5 Min. Virbereedung, duerno 20 Min. Gespréich (~4 Min./Fro). Froen ginn genee 5 Min. virum Ufank ausgedeelt.</p>
              <Timer />
            </section>

            <section className="card">
              <h2>3. Variante</h2>
              <div className="variante-switch">
                <button className={`switch-btn ${variante === "A" ? "active" : ""}`} onClick={() => varianteWaehlen("A")}>Variante A — 5 Froen × 6P</button>
                <button className={`switch-btn ${variante === "B" ? "active" : ""}`} onClick={() => varianteWaehlen("B")}>Variante B (mat Skizze) — 4 Froen × 7,5P</button>
              </div>
            </section>

            <section className="card">
              <h2>4. Froen & Punkten (max. 30P)</h2>
              {froen.map((f, i) => (
                <div className="fro-block" key={f.id}>
                  <span className="fro-nr">Fro {i + 1}</span>
                  <textarea className="textarea" rows={2} placeholder="Gestallte Fro..." value={f.frage} onChange={(e) => updateFro(f.id, { frage: e.target.value })} />
                  <div className="fro-punkte-row">
                    <input type="number" step="0.5" min="0" max={f.max} className="input input-points" value={f.punkte} onChange={(e) => updateFro(f.id, { punkte: e.target.value })} />
                    <span className="kat-max">/ {f.max}</span>
                  </div>
                </div>
              ))}
              <div className="summe-row">Zwëschesumme Fachwëssen: <strong>{summe} / 30</strong></div>
            </section>

            <section className="card">
              <h2>5. Eegebewäertung / Reflexioun (optional, +10P)</h2>
              <label className="toggle-row">
                <input type="checkbox" checked={reflexionAktiv} onChange={(e) => setReflexionAktiv(e.target.checked)} />
                <span>Dës Period huet och en eegent Reflexioun-Kritär (z.B. 2GSE Tri1/Tri3)</span>
              </label>
              {reflexionAktiv && (
                <div className="fro-punkte-row" style={{ marginTop: "10px" }}>
                  <input type="number" step="0.5" min="0" max="10" className="input input-points" value={reflexionPunkte} onChange={(e) => setReflexionPunkte(e.target.value)} />
                  <span className="kat-max">/ 10</span>
                </div>
              )}
            </section>

            <section className="card">
              <h2>6. Notiz (optional)</h2>
              <textarea className="textarea" rows={3} placeholder="Zousätzlech Bemierkungen..." value={notiz} onChange={(e) => setNotiz(e.target.value)} />
            </section>

            <section className="card summary-card">
              <div className="note-row">
                <span className="note-pill">{gesamt} / {maxGesamt}</span>
                <span className="note-hint">Gesamtpunkte fir dëst Fachgespréich</span>
              </div>
            </section>

            <div className="actions">
              <button className="btn btn-primary" disabled={!canSubmit || syncing} onClick={speicheren}>
                {syncing ? "Späichert…" : "✅ Fachgespréich späicheren"}
              </button>
            </div>
            {error && <div className="sync-error">{error}</div>}

            {bisherig.length > 0 && (
              <section className="card">
                <h2>Bisherech Fachgespréicher — {currentSchueler.name}</h2>
                <table className="tabelle">
                  <thead><tr><th>Datum</th><th>Periode</th><th>Variante</th><th>Punkten</th></tr></thead>
                  <tbody>
                    {bisherig.map((f, i) => (
                      <tr key={i}>
                        <td>{f.Datum}</td>
                        <td>{f.Periode}</td>
                        <td>{f.Variante}</td>
                        <td>{f.Gesamt}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </section>
            )}
          </>
        )}
      </main>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, "Segoe UI", Inter, Arial, sans-serif; color: #1c2621; background: #f6f8f6; }
.topbar { padding: 14px 22px; background: #00A94F; color: #fff; }
.brand { display: flex; align-items: baseline; gap: 10px; }
.brand-mark { font-weight: 800; font-size: 15px; letter-spacing: 0.06em; }
.brand-sub { font-size: 13px; opacity: 0.85; }
.content { max-width: 720px; margin: 0 auto; padding: 24px 20px 60px; }
.card { background: #fff; border: 1px solid #e2e8e3; border-radius: 12px; padding: 18px 20px; margin-bottom: 16px; }
.card h2 { font-size: 15px; margin: 0 0 12px; color: #00A94F; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field-label { font-size: 12.5px; font-weight: 700; color: #294f3c; }
.select, .input, .textarea { border: 1px solid #c9d5cd; border-radius: 7px; padding: 8px 10px; font-size: 13.5px; font-family: inherit; background: #fff; color: #1c2621; width: 100%; }
.select:disabled { background: #f1f3f1; color: #7a847e; }
.textarea { resize: vertical; }
.hint { font-size: 11.5px; color: #6d7d74; margin: 0 0 10px; line-height: 1.5; }
.timer-box { text-align: center; padding: 14px 0 4px; }
.timer-zeit { font-size: 42px; font-weight: 800; color: #00A94F; font-variant-numeric: tabular-nums; }
.timer-negativ { color: #99392f; }
.timer-label { font-size: 12.5px; color: #55625a; margin: 4px 0 14px; }
.timer-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.btn-stop { color: #99392f; }
.variante-switch { display: flex; gap: 8px; flex-wrap: wrap; }
.switch-btn { font-size: 12.5px; font-weight: 700; padding: 9px 14px; border-radius: 8px; border: 1px solid #c9d5cd; background: #fff; color: #55625a; cursor: pointer; flex: 1; min-width: 200px; }
.switch-btn.active { background: #00A94F; border-color: #00A94F; color: #fff; }
.fro-block { margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px dashed #eef1ef; }
.fro-nr { font-size: 11.5px; font-weight: 800; color: #294f3c; text-transform: uppercase; }
.fro-punkte-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.input-points { width: 70px; flex: none; text-align: right; }
.kat-max { font-size: 12.5px; color: #6d7d74; }
.summe-row { font-size: 13.5px; font-weight: 700; color: #294f3c; margin-top: 4px; }
.toggle-row { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
.summary-card { background: #eef3ef; }
.note-row { display: flex; align-items: center; gap: 10px; }
.note-pill { background: #00A94F; color: #fff; padding: 8px 18px; border-radius: 20px; font-size: 16px; font-weight: 800; }
.note-hint { font-size: 12px; color: #6d7d74; }
.btn-gen { font-size: 11.5px; font-weight: 700; color: #00A94F; background: #eef3ef; border: 1px solid #c9d5cd; padding: 7px 12px; border-radius: 7px; cursor: pointer; }
.btn { font-size: 13.5px; font-weight: 700; padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; }
.btn-primary { background: #00A94F; color: #fff; }
.btn-primary:disabled { background: #b7c6bd; cursor: not-allowed; }
.actions { padding: 4px 0 20px; }
.sync-error { color: #8a2b1f; font-size: 12.5px; background: #fbe4e1; padding: 8px 12px; border-radius: 8px; }
.tabelle { width: 100%; border-collapse: collapse; margin-top: 8px; }
.tabelle th { text-align: left; font-size: 11px; text-transform: uppercase; color: #6d7d74; padding: 6px 8px; border-bottom: 1px solid #eef1ef; }
.tabelle td { padding: 7px 8px; font-size: 13px; border-bottom: 1px solid #f4f6f4; }
.toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: #1c2621; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; }
</style>
</body>
</html>
