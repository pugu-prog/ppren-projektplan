<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PPREN Planungstool</title>
<script src="auth-guard.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
  window.addEventListener("error", function (e) {
    document.getElementById("root").innerHTML =
      '<div style="padding:40px;font-family:sans-serif;color:#8a2b1f;white-space:pre-wrap;">' +
      '<h2 style="margin-top:0;">Fehler beim Laden</h2>' +
      (e.message || "Unbekannter Fehler") +
      (e.filename ? "\n\nDatei: " + e.filename + " Zeile " + e.lineno : "") +
      "</div>";
  });
</script>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzfyThho8MevoyfSz7NsQ1YxZJO4E-f61GYYzqZyHACIHzxR3bm7SHCwVUkCBJrAEvJ/exec";

const SCHUELER = [
  { id: "lea_muller", name: "Léa Muller", klasse: "1GSE" },
  { id: "ben_weber", name: "Ben Weber", klasse: "2GSE" },
  { id: "noah_schmit", name: "Noah Schmit", klasse: "1GSE" },
  { id: "mia_reuter", name: "Mia Reuter", klasse: "2GSE" },
  { id: "tom_klein", name: "Tom Klein", klasse: "2GSE" },
];

// Lëtzebuerger Schoulvakanzen a Feierdeeg fir d'Schouljoer 2026/2027 (Quell: men.public.lu)
const VAKANZEN_2026_27 = [
  { start: "2026-10-31", end: "2026-11-08", label: "Allerheiligenferien" },
  { start: "2026-12-19", end: "2027-01-03", label: "Chreschtvakanz" },
  { start: "2027-02-06", end: "2027-02-14", label: "Karénervakanz" },
  { start: "2027-03-27", end: "2027-04-11", label: "Ouschterferien" },
  { start: "2027-05-29", end: "2027-06-06", label: "Pengschtferien" },
  { start: "2027-07-16", end: "2027-09-14", label: "Summerferien" },
];
const FEIERDEEG_2026_27 = [
  { datum: "2027-05-01", label: "Gesetzleche Feierdag (1. Mee)" },
  { datum: "2027-05-06", label: "Christi Himmelfahrt" },
  { datum: "2027-06-23", label: "Gebuertsdag Groussherzog" },
];

/** Gëtt de Label vun der Vakanz/dem Feierdag zréck, op deen dëst Datum fällt — oder null. */
function pruefVakanzOderFeierdag(iso) {
  if (!iso) return null;
  const feier = FEIERDEEG_2026_27.find((f) => f.datum === iso);
  if (feier) return feier.label;
  const vakanz = VAKANZEN_2026_27.find((v) => iso >= v.start && iso <= v.end);
  if (vakanz) return vakanz.label;
  return null;
}

const STATUS_OPTIONEN = ["Ausstoend", "Erreecht", "Verspéit"];
const KATEGORIE_FARWEN = { "Event": "#f0ec3a", "Iwwerpréiwung": "#d9d3f5", "Praktesch Phase": "#1ecdc4", "Ofgab": "#a9d92d", "Eegen": "#F67E1B", "Vakanz": "#b3d9e8", "Projektplang": "#5b9bd5" };
const KATEGORIE_TEXT = { "Event": "#1c2621", "Iwwerpréiwung": "#1c2621", "Praktesch Phase": "#04342c", "Ofgab": "#1c2621", "Eegen": "#ffffff", "Vakanz": "#1c4a5e", "Projektplang": "#ffffff" };
const VAKANZ_ZEILEN = VAKANZEN_2026_27.map((v) => ({
  id: "vak-" + v.start, datum: v.start, datumEnn: v.end, titel: v.label, kategorie: "Vakanz", quell: "Vakanz", status: "", notiz: "",
}));

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function App() {
  const urlParams = new URLSearchParams(window.location.search);
  const urlSchueler = urlParams.get("schueler");

  const [schuelerId, setSchuelerId] = useState(urlSchueler || "");
  const [gespaart, setGespaart] = useState(!!urlSchueler);
  const [eegenMeilensteng, setEegenMeilensteng] = useState([]); // nëmmen eege, editéierbar
  const [offiziell, setOffiziell] = useState([]); // vum Server, nëmmen liesen
  const [projektplang, setProjektplang] = useState([]); // Projektplang-Meilensteng, Status/Notiz editéierbar
  const [loading, setLoading] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [error, setError] = useState(null);
  const [toast, setToast] = useState(null);

  const currentSchueler = SCHUELER.find((s) => s.id === schuelerId);

  const lade = (id) => {
    const s = SCHUELER.find((x) => x.id === id);
    if (!s) return;
    setLoading(true);
    setError(null);
    fetch(WEB_APP_URL)
      .then((res) => res.json())
      .then((data) => {
        let gespäichert = [];
        const eintrag = (data.meilensteng || []).find((m) => m.Schüler === s.name);
        if (eintrag && eintrag["Meilensteng (JSON)"]) {
          try { gespäichert = JSON.parse(eintrag["Meilensteng (JSON)"]); } catch { gespäichert = []; }
        }
        // Offiziell: Datum/Titel/Kategorie IMMER live vum Server; Status/Notiz
        // aus der eegener gespäicherter Kopie iwwerhuelen, falls scho do.
        const offiziellFuerKlass = (data.offiziellZaitplang || [])
          .filter((m) => m.Klasse === s.klasse)
          .map((m) => {
            const refId = "off-" + m.Datum + "-" + m.Titel;
            const eegKopie = gespäichert.find((g) => g.id === refId);
            return {
              id: refId, datum: m.Datum, titel: m.Titel, kategorie: m.Kategorie || "Event",
              status: eegKopie?.status || "Ausstoend", notiz: eegKopie?.notiz || "", quell: "Offiziell",
            };
          });

        // Eege Meilensteng: alles mat quell "Eegen" (oder ouni quell = alt Format) —
        // ale Kopie-Duplikater aus der Zäit virun der quell-Ëmstellung erausfilteren
        // (déiselwecht Datum+Titel wéi eng offiziell Zeil ass keng richteg eege Zeil).
        const offiziellSchlëssel = new Set(offiziellFuerKlass.map((o) => o.datum + "|" + o.titel));
        setEegenMeilensteng(
          gespäichert
            .filter((m) => (m.quell || "Eegen") === "Eegen")
            .filter((m) => !offiziellSchlëssel.has(m.datum + "|" + m.titel))
        );
        // Projektplang-Meilensteng: kommen aus dem Projektplang-Formulaire (index.html),
        // Datum/Titel ginn do festgeluecht — hei just Status/Notiz upassbar.
        setProjektplang(gespäichert.filter((m) => m.quell === "Projektplang"));
        setOffiziell(offiziellFuerKlass);
      })
      .catch(() => setError("Konnte Meilensteng net lueden."))
      .finally(() => setLoading(false));
  };

  useEffect(() => { if (schuelerId) lade(schuelerId); }, [schuelerId]);

  const updateZeil = (id, patch) =>
    setEegenMeilensteng((ms) => ms.map((m) => (m.id === id ? { ...m, ...patch } : m)));
  const updateProjektplangZeil = (id, patch) =>
    setProjektplang((ms) => ms.map((m) => (m.id === id ? { ...m, ...patch } : m)));
  const addZeil = () =>
    setEegenMeilensteng((ms) => [...ms, { id: uid(), datum: "", titel: "", status: "Ausstoend", kategorie: "Eegen", notiz: "", quell: "Eegen" }]);
  const removeZeil = (id) =>
    setEegenMeilensteng((ms) => ms.filter((m) => m.id !== id));

  // Fir d'Uweisung: offiziell (Liesen) + Projektplang (Status/Notiz editéierbar)
  // + eege (Schreiwen) + Vakanzen zesummen, no Datum sortéiert
  const alleZesummen = useMemo(
    () => [...offiziell, ...projektplang, ...eegenMeilensteng, ...VAKANZ_ZEILEN].sort((a, b) => (a.datum || "").localeCompare(b.datum || "")),
    [offiziell, projektplang, eegenMeilensteng]
  );

  const speicheren = async () => {
    if (!currentSchueler) return;
    setSyncing(true);
    setError(null);
    try {
      // Späichert eege Meilensteng KOMPLETT + vun den offizielle just
      // d'Status/Notiz als kleng "Overlay"-Kopie (Datum/Titel/Kategorie
      // ginn beim Lueden ëmmer vum Server iwwerschriwwen). Projektplang-
      // Zeilen ginn komplett mat (Datum/Titel bleiwen d'selwecht wéi
      // gelueden, well se just am Projektplang-Formulaire änderbar sinn).
      const offiziellOverlay = offiziell.map((m) => ({ id: m.id, quell: "Offiziell", status: m.status, notiz: m.notiz }));
      const zSpäicheren = [...eegenMeilensteng, ...offiziellOverlay, ...projektplang];
      const res = await fetch(WEB_APP_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ typ: "meilensteng", schueler: currentSchueler.name, klasse: currentSchueler.klasse, meilensteng: zSpäicheren }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "Onbekannte Feeler");
      setToast("Gespäichert.");
    } catch (e) {
      setError("Konnte net späicheren: " + e.message);
    } finally {
      setSyncing(false);
      setTimeout(() => setToast(null), 3000);
    }
  };

  const csvExport = () => {
    const kopf = ["Datum", "Titel", "Kategorie", "Quell", "Status", "Notiz"];
    const zeilen = alleZesummen.map((m) => [m.datum, m.titel, m.kategorie, m.quell, m.status, m.notiz || ""]);
    const csv = [kopf, ...zeilen].map((r) => r.map((c) => `"${String(c).replace(/"/g, '""')}"`).join(";")).join("\n");
    const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `Meilensteng_${currentSchueler?.name || ""}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="wrap">
      <header className="topbar">
        <div className="brand">
          <span className="brand-mark">PPREN</span>
          <span className="brand-sub">Planungstool · Sciences Environnementales</span>
        </div>
      </header>

      <main className="content">
        <section className="card">
          {gespaart && currentSchueler ? (
            <div className="gespaart-row">
              <span className="gespaart-label">👤 {currentSchueler.name} ({currentSchueler.klasse})</span>
              <button className="link-btn-klein" onClick={() => setGespaart(false)}>Net dee/déi hei? Wiesselen</button>
            </div>
          ) : (
            <label className="field">
              <span className="field-label">Wie bass du?</span>
              <select className="select" value={schuelerId} onChange={(e) => setSchuelerId(e.target.value)}>
                <option value="">– auswählen –</option>
                {SCHUELER.map((s) => <option key={s.id} value={s.id}>{s.name} ({s.klasse})</option>)}
              </select>
            </label>
          )}
        </section>

        {loading && <div className="empty">Lädt…</div>}
        {error && <div className="empty error">{error}</div>}

        {schuelerId && !loading && (
          <>
            <section className="card">
              <div className="card-head">
                <h2>Meilensteng</h2>
                <div style={{ display: "flex", gap: "8px" }}>
                  <a className="btn-gen" href={`gantt.html?schueler=${schuelerId}`}>📊 Gantt-Chart uweisen →</a>
                  <button className="btn-gen" onClick={csvExport}>⬇️ CSV</button>
                </div>
              </div>
              <p className="hint">🔒 Offiziell Meilensteng (gro) kommen automatesch vum Prof. 📝 Projektplang-Meilensteng (blo) kommen aus dengem <a href={`index.html`}>Projektplang-Formulaire</a> — Datum/Titel do änneren, Status/Notiz hei. Deng eege Meilensteng (orange) kanns du fräi bearbechten.</p>
              <div className="tabelle-wrap">
                <table className="tabelle">
                  <thead>
                    <tr><th>Datum</th><th>Titel</th><th>Kategorie</th><th>Status</th><th>Notiz</th><th></th></tr>
                  </thead>
                  <tbody>
                    {alleZesummen.map((m) => {
                      const istOffiziell = m.quell === "Offiziell";
                      const istVakanz = m.quell === "Vakanz";
                      const istProjektplang = m.quell === "Projektplang";
                      const konflikt = !istVakanz && pruefVakanzOderFeierdag(m.datum);
                      if (istVakanz) {
                        return (
                          <tr key={m.id} className="zeil-vakanz">
                            <td colSpan={6}>
                              🏖️ <strong>{m.titel}</strong> ({new Date(m.datum).toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" })} – {new Date(m.datumEnn).toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "numeric" })})
                            </td>
                          </tr>
                        );
                      }
                      if (istProjektplang) {
                        return (
                          <tr key={m.id} className="zeil-gespaart">
                            <td>
                              <span className="datum-gespaart" title="Am Projektplang-Formulaire festgeluecht">📝 {m.datum}</span>
                              {konflikt && <div className="vakanz-hint">🏖️ {konflikt}</div>}
                            </td>
                            <td><span className="titel-gespaart">{m.titel}</span></td>
                            <td>
                              <span className="kategorie-badge" style={{ background: KATEGORIE_FARWEN.Projektplang, color: KATEGORIE_TEXT.Projektplang }}>Projektplang</span>
                            </td>
                            <td>
                              <select className="select" value={m.status} onChange={(e) => updateProjektplangZeil(m.id, { status: e.target.value })}>
                                {STATUS_OPTIONEN.map((s) => <option key={s} value={s}>{s}</option>)}
                              </select>
                            </td>
                            <td>
                              <input className="input" placeholder="optional" value={m.notiz || ""} onChange={(e) => updateProjektplangZeil(m.id, { notiz: e.target.value })} />
                            </td>
                            <td></td>
                          </tr>
                        );
                      }
                      return (
                        <tr key={m.id} className={istOffiziell ? "zeil-gespaart" : ""}>
                          <td>
                            {istOffiziell ? (
                              <span className="datum-gespaart" title="Nëmmen de Prof kann dëst Datum réckelen">🔒 {m.datum}</span>
                            ) : (
                              <input type="date" className="input input-date" value={m.datum} onChange={(e) => updateZeil(m.id, { datum: e.target.value })} />
                            )}
                            {konflikt && <div className="vakanz-hint">🏖️ {konflikt}</div>}
                          </td>
                          <td>
                            {istOffiziell ? <span className="titel-gespaart">{m.titel}</span> :
                              <input className="input" placeholder="Titel vum Meilensteng" value={m.titel} onChange={(e) => updateZeil(m.id, { titel: e.target.value })} />}
                          </td>
                          <td>
                            <span className="kategorie-badge" style={{ background: KATEGORIE_FARWEN[m.kategorie], color: KATEGORIE_TEXT[m.kategorie] }}>{m.kategorie}</span>
                          </td>
                          <td>
                            <select className="select" value={m.status} onChange={(e) => updateZeil(m.id, { status: e.target.value })}>
                              {STATUS_OPTIONEN.map((s) => <option key={s} value={s}>{s}</option>)}
                            </select>
                          </td>
                          <td>
                            <input className="input" placeholder="optional" value={m.notiz || ""} onChange={(e) => updateZeil(m.id, { notiz: e.target.value })} />
                          </td>
                          <td>{!istOffiziell && <button className="icon-btn" onClick={() => removeZeil(m.id)}>✕</button>}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <button className="add-btn" onClick={addZeil}>+ Eegene Meilensteng derbäisetzen</button>
            </section>

            <div className="actions">
              <button className="btn btn-primary" disabled={syncing} onClick={speicheren}>
                {syncing ? "Späichert…" : "💾 Späicheren"}
              </button>
            </div>
          </>
        )}
      </main>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, "Segoe UI", Inter, Arial, sans-serif; color: #1c2621; background: #f6f8f6; }
.topbar { padding: 14px 22px; background: #00A94F; color: #fff; }
.brand { display: flex; align-items: baseline; gap: 10px; }
.brand-mark { font-weight: 800; font-size: 15px; letter-spacing: 0.06em; }
.brand-sub { font-size: 13px; opacity: 0.85; }
.content { max-width: 820px; margin: 0 auto; padding: 24px 20px 60px; }
.card { background: #fff; border: 1px solid #e2e8e3; border-radius: 12px; padding: 18px 20px; margin-bottom: 16px; }
.card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
.card h2 { font-size: 15px; margin: 0; color: #00A94F; }
.field { display: flex; flex-direction: column; gap: 4px; }
.gespaart-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.gespaart-label { font-size: 14px; font-weight: 700; color: #294f3c; }
.link-btn-klein { font-size: 11px; color: #93a098; background: none; border: none; text-decoration: underline; cursor: pointer; }
.kategorie-badge { display: inline-block; font-size: 11.5px; font-weight: 700; padding: 5px 10px; border-radius: 20px; }
.field-label { font-size: 12.5px; font-weight: 700; color: #294f3c; }

.datum-gespaart, .titel-gespaart { font-size: 13px; color: #55625a; }

.zeil-vakanz td { padding: 8px; font-size: 12.5px; color: #1c4a5e; }

.actions { padding: 4px 0 20px; }

.btn-primary { background: #00A94F; color: #fff; }

</style>
</body>
