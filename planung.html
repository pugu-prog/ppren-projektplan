<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PPREN Planungstool</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
  window.addEventListener("error", function (e) {
    document.getElementById("root").innerHTML =
      '<div style="padding:40px;font-family:sans-serif;color:#8a2b1f;white-space:pre-wrap;">' +
      '<h2 style="margin-top:0;">Fehler beim Laden</h2>' +
      (e.message || "Unbekannter Fehler") +
      (e.filename ? "\n\nDatei: " + e.filename + " Zeile " + e.lineno : "") +
      "</div>";
  });
</script>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzfyThho8MevoyfSz7NsQ1YxZJO4E-f61GYYzqZyHACIHzxR3bm7SHCwVUkCBJrAEvJ/exec";

const SCHUELER = [
  { id: "lea_muller", name: "Léa Muller", klasse: "1GSE" },
  { id: "ben_weber", name: "Ben Weber", klasse: "2GSE" },
  { id: "noah_schmit", name: "Noah Schmit", klasse: "1GSE" },
  { id: "mia_reuter", name: "Mia Reuter", klasse: "2GSE" },
  { id: "tom_klein", name: "Tom Klein", klasse: "2GSE" },
];

// Offizieller Zäitplang 2026/27, aus zeitplang.html — als Startpunkt beim Importéieren
const OFFIZIELL_1GSE = [
  { datum: "2026-09-07", titel: "Präsentation PPREN", kategorie: "Event" },
  { datum: "2026-10-06", titel: "Projektplang erstellen", kategorie: "Event" },
  { datum: "2026-10-26", titel: "Ziler iwwerpréiwen", kategorie: "Iwwerpréiwung" },
  { datum: "2026-12-07", titel: "Ofgab Dokumentatioun", kategorie: "Ofgab" },
  { datum: "2027-01-11", titel: "Start 2. Semester", kategorie: "Event" },
  { datum: "2027-01-26", titel: "Fachgespréicher 2GSE", kategorie: "Event" },
  { datum: "2027-02-01", titel: "Ziler iwwerpréiwen", kategorie: "Iwwerpréiwung" },
  { datum: "2027-03-02", titel: "Prüfung & Ofgab Dokumentatioun", kategorie: "Ofgab" },
  { datum: "2027-03-08", titel: "Ziler iwwerpréiwen", kategorie: "Iwwerpréiwung" },
  { datum: "2027-04-26", titel: "Presentatioun & Ofgab Dokumentatioun", kategorie: "Ofgab" },
  { datum: "2027-05-03", titel: "Fachgespréicher", kategorie: "Event" },
];

const OFFIZIELL_2GSE = [
  { datum: "2026-09-07", titel: "Präsentation PPREN", kategorie: "Event" },
  { datum: "2026-10-06", titel: "Projektplang erstellen", kategorie: "Event" },
  { datum: "2026-10-26", titel: "Ziler iwwerpréiwen", kategorie: "Iwwerpréiwung" },
  { datum: "2026-12-07", titel: "Ofgab Dokumentatioun", kategorie: "Ofgab" },
  { datum: "2027-01-04", titel: "Start 2. Trimester", kategorie: "Event" },
  { datum: "2027-01-26", titel: "Fachgespréicher 2GSE", kategorie: "Event" },
  { datum: "2027-02-01", titel: "Ziler iwwerpréiwen", kategorie: "Iwwerpréiwung" },
  { datum: "2027-03-02", titel: "Prüfung & Ofgab Dokumentatioun", kategorie: "Ofgab" },
  { datum: "2027-03-08", titel: "Ziler iwwerpréiwen", kategorie: "Iwwerpréiwung" },
  { datum: "2027-04-12", titel: "Start 3e Trimester", kategorie: "Event" },
  { datum: "2027-05-03", titel: "Ziler iwwerpréiwen", kategorie: "Iwwerpréiwung" },
  { datum: "2027-06-21", titel: "Presentatioun & Ofgab Dokumentatioun", kategorie: "Ofgab" },
  { datum: "2027-06-28", titel: "Fachgespréicher", kategorie: "Event" },
];

const STATUS_OPTIONEN = ["Ausstoend", "Erreecht", "Verspéit"];
const KATEGORIE_OPTIONEN = ["Event", "Iwwerpréiwung", "Praktesch Phase", "Ofgab", "Eegen"];
// Selwecht Faarfpalette wéi zeitplang.html: gelb=event, lila=iwwerpréiwung, teal=praktesch phase
// "Eegen" = Schüler-derbäigesat, eege markant Faarf (net aus dem offizielle Set)
const KATEGORIE_FARWEN = { "Event": "#f0ec3a", "Iwwerpréiwung": "#d9d3f5", "Praktesch Phase": "#1ecdc4", "Ofgab": "#a9d92d", "Eegen": "#F67E1B" };
const KATEGORIE_TEXT = { "Event": "#1c2621", "Iwwerpréiwung": "#1c2621", "Praktesch Phase": "#04342c", "Ofgab": "#1c2621", "Eegen": "#ffffff" };
// Status weist sech als Rand ëm de Balken
const STATUS_RAND = { "Ausstoend": "transparent", "Erreecht": "#00A94F", "Verspéit": "#e8483a" };

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function App() {
  const urlParams = new URLSearchParams(window.location.search);
  const urlSchueler = urlParams.get("schueler");
  const profModusUrl = urlParams.get("prof") === "1";

  const [schuelerId, setSchuelerId] = useState(urlSchueler || "");
  const [gespaart, setGespaart] = useState(!!urlSchueler); // Auswiel-Dropdown ausgeblent, wann iwwer Link komm
  const [profModus, setProfModus] = useState(profModusUrl);
  const [meilensteng, setMeilensteng] = useState([]);
  const [loading, setLoading] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [error, setError] = useState(null);
  const [toast, setToast] = useState(null);

  const currentSchueler = SCHUELER.find((s) => s.id === schuelerId);

  const lade = (id) => {
    const s = SCHUELER.find((x) => x.id === id);
    if (!s) return;
    setLoading(true);
    setError(null);
    fetch(WEB_APP_URL)
      .then((res) => res.json())
      .then((data) => {
        const eintrag = (data.meilensteng || []).find((m) => m.Schüler === s.name);
        if (eintrag && eintrag["Meilensteng (JSON)"]) {
          try {
            setMeilensteng(JSON.parse(eintrag["Meilensteng (JSON)"]));
          } catch {
            setMeilensteng([]);
          }
        } else {
          setMeilensteng([]);
        }
      })
      .catch(() => setError("Konnte Meilensteng net lueden."))
      .finally(() => setLoading(false));
  };

  useEffect(() => { if (schuelerId) lade(schuelerId); }, [schuelerId]);

  const importéieren = () => {
    if (!currentSchueler) return;
    const quell = currentSchueler.klasse === "2GSE" ? OFFIZIELL_2GSE : OFFIZIELL_1GSE;
    if (meilensteng.length > 0 && !confirm("Dat ersetzt déi aktuell Lëscht mat den offizielle Datumer. Weiderfueren?")) return;
    setMeilensteng(quell.map((q) => ({ id: uid(), datum: q.datum, titel: q.titel, status: "Ausstoend", kategorie: q.kategorie || "Event", notiz: "", quell: "Offiziell" })));
  };

  const updateZeil = (id, patch) =>
    setMeilensteng((ms) => ms.map((m) => (m.id === id ? { ...m, ...patch } : m)));
  const addZeil = () =>
    setMeilensteng((ms) => [...ms, { id: uid(), datum: "", titel: "", status: "Ausstoend", kategorie: "Eegen", notiz: "", quell: "Eegen" }]);
  const removeZeil = (id) =>
    setMeilensteng((ms) => ms.filter((m) => m.id !== id));

  const sortéiert = useMemo(
    () => [...meilensteng].sort((a, b) => (a.datum || "").localeCompare(b.datum || "")),
    [meilensteng]
  );

  const speicheren = async () => {
    if (!currentSchueler) return;
    setSyncing(true);
    setError(null);
    try {
      const res = await fetch(WEB_APP_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ typ: "meilensteng", schueler: currentSchueler.name, klasse: currentSchueler.klasse, meilensteng }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "Onbekannte Feeler");
      setToast("Gespäichert.");
    } catch (e) {
      setError("Konnte net späicheren: " + e.message);
    } finally {
      setSyncing(false);
      setTimeout(() => setToast(null), 3000);
    }
  };

  const csvExport = () => {
    const kopf = ["Datum", "Titel", "Status", "Notiz"];
    const zeilen = sortéiert.map((m) => [m.datum, m.titel, m.status, m.notiz || ""]);
    const csv = [kopf, ...zeilen].map((r) => r.map((c) => `"${String(c).replace(/"/g, '""')}"`).join(";")).join("\n");
    const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `Meilensteng_${currentSchueler?.name || ""}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // Timeline-Skala: Schouljoer September–Juli
  const zeitraumStart = new Date("2026-09-01").getTime();
  const zeitraumEnde = new Date("2027-07-31").getTime();
  const prozentFuer = (datum) => {
    if (!datum) return null;
    const t = new Date(datum).getTime();
    if (isNaN(t)) return null;
    return Math.min(100, Math.max(0, ((t - zeitraumStart) / (zeitraumEnde - zeitraumStart)) * 100));
  };

  return (
    <div className="wrap">
      <header className="topbar">
        <div className="brand">
          <span className="brand-mark">PPREN</span>
          <span className="brand-sub">Planungstool · Sciences Environnementales</span>
        </div>
      </header>

      <main className="content">
        <section className="card">
          {gespaart && currentSchueler ? (
            <div className="gespaart-row">
              <span className="gespaart-label">👤 {currentSchueler.name} ({currentSchueler.klasse})</span>
              <button className="link-btn-klein" onClick={() => { setGespaart(false); }}>Net dee/déi hei? Wiesselen</button>
            </div>
          ) : (
            <label className="field">
              <span className="field-label">Wie bass du?</span>
              <select className="select" value={schuelerId} onChange={(e) => setSchuelerId(e.target.value)}>
                <option value="">– auswählen –</option>
                {SCHUELER.map((s) => <option key={s.id} value={s.id}>{s.name} ({s.klasse})</option>)}
              </select>
            </label>
          )}
          <label className="prof-toggle">
            <input type="checkbox" checked={profModus} onChange={(e) => setProfModus(e.target.checked)} />
            <span>👩‍🏫 Prof-Modus (Kategorien änneren, offiziell Datumer réckelen)</span>
          </label>
        </section>

        {loading && <div className="empty">Lädt…</div>}
        {error && <div className="empty error">{error}</div>}

        {schuelerId && !loading && (
          <>
            <section className="card">
              <div className="card-head">
                <h2>Meilensteng</h2>
                <div style={{ display: "flex", gap: "8px" }}>
                  <a className="btn-gen" href={`gantt.html?schueler=${schuelerId}${profModus ? "&prof=1" : ""}`}>📊 Gantt-Chart uweisen →</a>
                  <button className="btn-gen" onClick={importéieren}>📥 Vum offiziellen Zäitplang importéieren</button>
                  <button className="btn-gen" onClick={csvExport}>⬇️ CSV</button>
                </div>
              </div>
              {sortéiert.length === 0 && (
                <p className="notice">Nach keng Meilensteng. Importéier de offiziellen Zäitplang oder setz manuell Zeilen derbäi.</p>
              )}
              <div className="tabelle-wrap">
                <table className="tabelle">
                  <thead>
                    <tr><th>Datum</th><th>Titel</th><th>Kategorie</th><th>Status</th><th>Notiz</th><th></th></tr>
                  </thead>
                  <tbody>
                    {meilensteng.map((m) => {
                      const quell = m.quell || "Eegen";
                      const datumGespaart = !profModus && quell === "Offiziell";
                      const kategorieGespaart = !profModus;
                      return (
                        <tr key={m.id}>
                          <td>
                            <input type="date" className="input input-date" value={m.datum} disabled={datumGespaart} title={datumGespaart ? "Offiziellt Datum — nëmmen de Prof kann dat réckelen" : ""} onChange={(e) => updateZeil(m.id, { datum: e.target.value })} />
                          </td>
                          <td><input className="input" placeholder="Titel vum Meilensteng" value={m.titel} onChange={(e) => updateZeil(m.id, { titel: e.target.value })} /></td>
                          <td>
                            {kategorieGespaart ? (
                              <span className="kategorie-badge" style={{ background: KATEGORIE_FARWEN[m.kategorie], color: KATEGORIE_TEXT[m.kategorie] }}>{m.kategorie}</span>
                            ) : (
                              <select className="select status-select" style={{ background: KATEGORIE_FARWEN[m.kategorie], color: KATEGORIE_TEXT[m.kategorie] }} value={m.kategorie || "Event"} onChange={(e) => updateZeil(m.id, { kategorie: e.target.value })}>
                                {KATEGORIE_OPTIONEN.map((k) => <option key={k} value={k}>{k}</option>)}
                              </select>
                            )}
                          </td>
                          <td>
                            <select className="select" value={m.status} onChange={(e) => updateZeil(m.id, { status: e.target.value })}>
                              {STATUS_OPTIONEN.map((s) => <option key={s} value={s}>{s}</option>)}
                            </select>
                          </td>
                          <td><input className="input" placeholder="optional" value={m.notiz || ""} onChange={(e) => updateZeil(m.id, { notiz: e.target.value })} /></td>
                          <td>{(profModus || quell === "Eegen") && <button className="icon-btn" onClick={() => removeZeil(m.id)}>✕</button>}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <button className="add-btn" onClick={addZeil}>+ Eegene Meilensteng derbäisetzen</button>
            </section>

            <div className="actions">
              <button className="btn btn-primary" disabled={syncing} onClick={speicheren}>
                {syncing ? "Späichert…" : "💾 Späicheren"}
              </button>
            </div>
          </>
        )}
      </main>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<style>
* { box-sizing: border-box; }

.brand { display: flex; align-items: baseline; gap: 10px; }
.brand-mark { font-weight: 800; font-size: 15px; letter-spacing: 0.06em; }
.brand-sub { font-size: 13px; opacity: 0.85; }
.content { max-width: 820px; margin: 0 auto; padding: 24px 20px 60px; }

.card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.card h2 { font-size: 15px; margin: 0; color: #00A94F; }
.field { display: flex; flex-direction: column; gap: 4px; }

.gespaart-label { font-size: 14px; font-weight: 700; color: #294f3c; }

.kategorie-badge { display: inline-block; font-size: 11.5px; font-weight: 700; padding: 5px 10px; border-radius: 20px; }

.select, .input { border: 1px solid #c9d5cd; border-radius: 7px; padding: 8px 10px; font-size: 13.5px; font-family: inherit; background: #fff; color: #1c2621; }

.actions { padding: 4px 0 20px; }

.gantt-datum { font-size: 10.5px; color: #93a098; }

.gantt-bar-label { max-width: 160px; overflow: hidden; text-overflow: ellipsis; }

</style>
</body>
</html>
