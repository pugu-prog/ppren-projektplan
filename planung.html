<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PPREN Planungstool</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
  window.addEventListener("error", function (e) {
    document.getElementById("root").innerHTML =
      '<div style="padding:40px;font-family:sans-serif;color:#8a2b1f;white-space:pre-wrap;">' +
      '<h2 style="margin-top:0;">Fehler beim Laden</h2>' +
      (e.message || "Unbekannter Fehler") +
      (e.filename ? "\n\nDatei: " + e.filename + " Zeile " + e.lineno : "") +
      "</div>";
  });
</script>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzfyThho8MevoyfSz7NsQ1YxZJO4E-f61GYYzqZyHACIHzxR3bm7SHCwVUkCBJrAEvJ/exec";

const SCHUELER = [
  { id: "lea_muller", name: "Léa Muller", klasse: "1GSE" },
  { id: "ben_weber", name: "Ben Weber", klasse: "2GSE" },
  { id: "noah_schmit", name: "Noah Schmit", klasse: "1GSE" },
  { id: "mia_reuter", name: "Mia Reuter", klasse: "2GSE" },
  { id: "tom_klein", name: "Tom Klein", klasse: "2GSE" },
];

// Offizieller Zäitplang 2026/27, aus zeitplang.html — als Startpunkt beim Importéieren
const OFFIZIELL_1GSE = [
  { datum: "2026-09-07", titel: "Präsentation PPREN" },
  { datum: "2026-10-06", titel: "Projektplang erstellen" },
  { datum: "2026-10-26", titel: "Ziler iwwerpréiwen" },
  { datum: "2026-12-07", titel: "Ofgab Dokumentatioun" },
  { datum: "2027-01-11", titel: "Start 2. Semester" },
  { datum: "2027-01-26", titel: "Fachgespréicher 2GSE" },
  { datum: "2027-02-01", titel: "Ziler iwwerpréiwen" },
  { datum: "2027-03-02", titel: "Prüfung & Ofgab Dokumentatioun" },
  { datum: "2027-03-08", titel: "Ziler iwwerpréiwen" },
  { datum: "2027-04-26", titel: "Presentatioun & Ofgab Dokumentatioun" },
  { datum: "2027-05-03", titel: "Fachgespréicher" },
];

const OFFIZIELL_2GSE = [
  { datum: "2026-09-07", titel: "Präsentation PPREN" },
  { datum: "2026-10-06", titel: "Projektplang erstellen" },
  { datum: "2026-10-26", titel: "Ziler iwwerpréiwen" },
  { datum: "2026-12-07", titel: "Ofgab Dokumentatioun" },
  { datum: "2027-01-04", titel: "Start 2. Trimester" },
  { datum: "2027-01-26", titel: "Fachgespréicher 2GSE" },
  { datum: "2027-02-01", titel: "Ziler iwwerpréiwen" },
  { datum: "2027-03-02", titel: "Prüfung & Ofgab Dokumentatioun" },
  { datum: "2027-03-08", titel: "Ziler iwwerpréiwen" },
  { datum: "2027-04-12", titel: "Start 3e Trimester" },
  { datum: "2027-05-03", titel: "Ziler iwwerpréiwen" },
  { datum: "2027-06-21", titel: "Presentatioun & Ofgab Dokumentatioun" },
  { datum: "2027-06-28", titel: "Fachgespréicher" },
];

const STATUS_OPTIONEN = ["Ausstoend", "Erreecht", "Verspéit"];
const STATUS_FARWEN = { "Ausstoend": "#e6e9e6", "Erreecht": "#d7ecdd", "Verspéit": "#fbe4e1" };
const STATUS_TEXT = { "Ausstoend": "#55625a", "Erreecht": "#00A94F", "Verspéit": "#99392f" };

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function App() {
  const [schuelerId, setSchuelerId] = useState("");
  const [meilensteng, setMeilensteng] = useState([]);
  const [loading, setLoading] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [error, setError] = useState(null);
  const [toast, setToast] = useState(null);

  const currentSchueler = SCHUELER.find((s) => s.id === schuelerId);

  const lade = (id) => {
    const s = SCHUELER.find((x) => x.id === id);
    if (!s) return;
    setLoading(true);
    setError(null);
    fetch(WEB_APP_URL)
      .then((res) => res.json())
      .then((data) => {
        const eintrag = (data.meilensteng || []).find((m) => m.Schüler === s.name);
        if (eintrag && eintrag["Meilensteng (JSON)"]) {
          try {
            setMeilensteng(JSON.parse(eintrag["Meilensteng (JSON)"]));
          } catch {
            setMeilensteng([]);
          }
        } else {
          setMeilensteng([]);
        }
      })
      .catch(() => setError("Konnte Meilensteng net lueden."))
      .finally(() => setLoading(false));
  };

  useEffect(() => { if (schuelerId) lade(schuelerId); }, [schuelerId]);

  const importéieren = () => {
    if (!currentSchueler) return;
    const quell = currentSchueler.klasse === "2GSE" ? OFFIZIELL_2GSE : OFFIZIELL_1GSE;
    if (meilensteng.length > 0 && !confirm("Dat ersetzt déi aktuell Lëscht mat den offizielle Datumer. Weiderfueren?")) return;
    setMeilensteng(quell.map((q) => ({ id: uid(), datum: q.datum, titel: q.titel, status: "Ausstoend", notiz: "" })));
  };

  const updateZeil = (id, patch) =>
    setMeilensteng((ms) => ms.map((m) => (m.id === id ? { ...m, ...patch } : m)));
  const addZeil = () =>
    setMeilensteng((ms) => [...ms, { id: uid(), datum: "", titel: "", status: "Ausstoend", notiz: "" }]);
  const removeZeil = (id) =>
    setMeilensteng((ms) => ms.filter((m) => m.id !== id));

  const sortéiert = useMemo(
    () => [...meilensteng].sort((a, b) => (a.datum || "").localeCompare(b.datum || "")),
    [meilensteng]
  );

  const speicheren = async () => {
    if (!currentSchueler) return;
    setSyncing(true);
    setError(null);
    try {
      const res = await fetch(WEB_APP_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ typ: "meilensteng", schueler: currentSchueler.name, klasse: currentSchueler.klasse, meilensteng }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "Onbekannte Feeler");
      setToast("Gespäichert.");
    } catch (e) {
      setError("Konnte net späicheren: " + e.message);
    } finally {
      setSyncing(false);
      setTimeout(() => setToast(null), 3000);
    }
  };

  const csvExport = () => {
    const kopf = ["Datum", "Titel", "Status", "Notiz"];
    const zeilen = sortéiert.map((m) => [m.datum, m.titel, m.status, m.notiz || ""]);
    const csv = [kopf, ...zeilen].map((r) => r.map((c) => `"${String(c).replace(/"/g, '""')}"`).join(";")).join("\n");
    const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `Meilensteng_${currentSchueler?.name || ""}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // Timeline-Skala: Schouljoer September–Juli
  const zeitraumStart = new Date("2026-09-01").getTime();
  const zeitraumEnde = new Date("2027-07-31").getTime();
  const prozentFuer = (datum) => {
    if (!datum) return null;
    const t = new Date(datum).getTime();
    if (isNaN(t)) return null;
    return Math.min(100, Math.max(0, ((t - zeitraumStart) / (zeitraumEnde - zeitraumStart)) * 100));
  };

  return (
    <div className="wrap">
      <header className="topbar">
        <div className="brand">
          <span className="brand-mark">PPREN</span>
          <span className="brand-sub">Planungstool · Sciences Environnementales</span>
        </div>
      </header>

      <main className="content">
        <section className="card">
          <label className="field">
            <span className="field-label">Wie bass du?</span>
            <select className="select" value={schuelerId} onChange={(e) => setSchuelerId(e.target.value)}>
              <option value="">– auswählen –</option>
              {SCHUELER.map((s) => <option key={s.id} value={s.id}>{s.name} ({s.klasse})</option>)}
            </select>
          </label>
        </section>

        {loading && <div className="empty">Lädt…</div>}
        {error && <div className="empty error">{error}</div>}

        {schuelerId && !loading && (
          <>
            <section className="card">
              <div className="card-head">
                <h2>Timeline</h2>
                <button className="btn-gen" onClick={importéieren}>📥 Vum offiziellen Zäitplang importéieren</button>
              </div>
              {sortéiert.length === 0 ? (
                <p className="notice">Nach keng Meilensteng. Importéier de offiziellen Zäitplang oder setz manuell Zeilen derbäi.</p>
              ) : (
                <div className="gantt">
                  <div className="gantt-monatslinie">
                    {["Sep","Okt","Nov","Dez","Jan","Feb","Mär","Apr","Mai","Jun","Jul"].map((mo, i) => (
                      <span key={mo} style={{ left: `${(i / 11) * 100}%` }} className="gantt-mo">{mo}</span>
                    ))}
                  </div>
                  {sortéiert.filter((m) => m.datum).map((m) => (
                    <div key={m.id} className="gantt-row">
                      <div className="gantt-row-label">
                        <span className="gantt-titel">{m.titel || "(ouni Titel)"}</span>
                        <span className="gantt-datum">{new Date(m.datum).toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "numeric" })}</span>
                      </div>
                      <div className="gantt-track">
                        <div
                          className="gantt-bar"
                          style={{ left: `${prozentFuer(m.datum)}%`, background: STATUS_TEXT[m.status] || "#888" }}
                        >
                          <span className="gantt-bar-label">{m.titel}</span>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </section>

            <section className="card">
              <div className="card-head">
                <h2>Meilensteng</h2>
                <button className="btn-gen" onClick={csvExport}>⬇️ CSV</button>
              </div>
              <div className="tabelle-wrap">
                <table className="tabelle">
                  <thead>
                    <tr><th>Datum</th><th>Titel</th><th>Status</th><th>Notiz</th><th></th></tr>
                  </thead>
                  <tbody>
                    {meilensteng.map((m) => (
                      <tr key={m.id}>
                        <td><input type="date" className="input input-date" value={m.datum} onChange={(e) => updateZeil(m.id, { datum: e.target.value })} /></td>
                        <td><input className="input" placeholder="Titel vum Meilensteng" value={m.titel} onChange={(e) => updateZeil(m.id, { titel: e.target.value })} /></td>
                        <td>
                          <select className="select status-select" style={{ background: STATUS_FARWEN[m.status], color: STATUS_TEXT[m.status] }} value={m.status} onChange={(e) => updateZeil(m.id, { status: e.target.value })}>
                            {STATUS_OPTIONEN.map((s) => <option key={s} value={s}>{s}</option>)}
                          </select>
                        </td>
                        <td><input className="input" placeholder="optional" value={m.notiz || ""} onChange={(e) => updateZeil(m.id, { notiz: e.target.value })} /></td>
                        <td><button className="icon-btn" onClick={() => removeZeil(m.id)}>✕</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <button className="add-btn" onClick={addZeil}>+ Meilensteng derbäisetzen</button>
            </section>

            <div className="actions">
              <button className="btn btn-primary" disabled={syncing} onClick={speicheren}>
                {syncing ? "Späichert…" : "💾 Späicheren"}
              </button>
            </div>
          </>
        )}
      </main>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, "Segoe UI", Inter, Arial, sans-serif; color: #1c2621; background: #f6f8f6; }
.topbar { padding: 14px 22px; background: #00A94F; color: #fff; }
.brand { display: flex; align-items: baseline; gap: 10px; }
.brand-mark { font-weight: 800; font-size: 15px; letter-spacing: 0.06em; }
.brand-sub { font-size: 13px; opacity: 0.85; }
.content { max-width: 820px; margin: 0 auto; padding: 24px 20px 60px; }
.card { background: #fff; border: 1px solid #e2e8e3; border-radius: 12px; padding: 18px 20px; margin-bottom: 16px; }
.card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.card h2 { font-size: 15px; margin: 0; color: #00A94F; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field-label { font-size: 12.5px; font-weight: 700; color: #294f3c; }
.select, .input { border: 1px solid #c9d5cd; border-radius: 7px; padding: 8px 10px; font-size: 13.5px; font-family: inherit; background: #fff; color: #1c2621; }
.status-select { font-weight: 700; border: none; }
.notice { background: #fbe8c6; color: #8a5a12; font-size: 12.5px; padding: 10px 14px; border-radius: 8px; margin: 0; line-height: 1.5; }
.empty { padding: 30px; text-align: center; color: #6d7d74; font-size: 14px; background: #fff; border-radius: 12px; border: 1px solid #e2e8e3; }
.error { color: #8a2b1f; }
.btn-gen { font-size: 11.5px; font-weight: 700; color: #00A94F; background: #eef3ef; border: 1px solid #c9d5cd; padding: 6px 12px; border-radius: 7px; cursor: pointer; }
.tabelle-wrap { overflow-x: auto; }
.tabelle { width: 100%; border-collapse: collapse; }
.tabelle th { text-align: left; font-size: 11px; text-transform: uppercase; color: #6d7d74; padding: 6px 8px; border-bottom: 1px solid #eef1ef; }
.tabelle td { padding: 5px 8px; border-bottom: 1px solid #f4f6f4; }
.input-date { min-width: 130px; }
.icon-btn { border: none; background: transparent; color: #99392f; cursor: pointer; font-size: 13px; width: 24px; height: 24px; border-radius: 6px; }
.add-btn { margin-top: 10px; border: 1px dashed #9db6a7; background: transparent; color: #00A94F; font-size: 12.5px; font-weight: 600; padding: 6px 10px; border-radius: 7px; cursor: pointer; }
.actions { padding: 4px 0 20px; }
.btn { font-size: 13.5px; font-weight: 700; padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; }
.btn-primary { background: #00A94F; color: #fff; }
.btn-primary:disabled { background: #b7c6bd; cursor: not-allowed; }
.gantt { padding: 4px 0 0; }
.gantt-monatslinie { position: relative; height: 20px; border-bottom: 1px solid #eef1ef; margin-bottom: 6px; margin-left: 190px; }
.gantt-mo { position: absolute; font-size: 10.5px; color: #93a098; transform: translateX(-50%); }
.gantt-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #f7f8f7; }
.gantt-row-label { width: 180px; flex: 0 0 180px; display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
.gantt-titel { font-size: 12.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gantt-datum { font-size: 10.5px; color: #93a098; }
.gantt-track { position: relative; flex: 1; height: 22px; background: #f7f8f7; border-radius: 5px; }
.gantt-bar { position: absolute; top: 2px; height: 18px; padding: 0 10px; border-radius: 9px; display: flex; align-items: center; white-space: nowrap; color: #fff; font-size: 11px; font-weight: 700; box-shadow: 0 1px 2px rgba(0,0,0,0.12); }
.gantt-bar-label { max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
.toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: #1c2621; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; }
</style>
</body>
</html>
