<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PPREN Mäin Suivi</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
  window.addEventListener("error", function (e) {
    document.getElementById("root").innerHTML =
      '<div style="padding:40px;font-family:sans-serif;color:#8a2b1f;white-space:pre-wrap;">' +
      '<h2 style="margin-top:0;">Fehler beim Laden</h2>' +
      (e.message || "Unbekannter Fehler") +
      (e.filename ? "\n\nDatei: " + e.filename + " Zeile " + e.lineno : "") +
      "</div>";
  });
</script>
<script type="text/babel">
const { useState, useEffect } = React;

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzfyThho8MevoyfSz7NsQ1YxZJO4E-f61GYYzqZyHACIHzxR3bm7SHCwVUkCBJrAEvJ/exec";

const SCHUELER = [
  { id: "lea_muller", name: "Léa Muller", klasse: "1GSE" },
  { id: "ben_weber", name: "Ben Weber", klasse: "2GSE" },
  { id: "noah_schmit", name: "Noah Schmit", klasse: "1GSE" },
  { id: "mia_reuter", name: "Mia Reuter", klasse: "2GSE" },
  { id: "tom_klein", name: "Tom Klein", klasse: "2GSE" },
];

const PERIODEN_2GSE = ["Trimester 1", "Trimester 2", "Trimester 3"];
const PERIODEN_1GSE = ["Semester 1", "Semester 2"];

function sicherJson(text, fallback) {
  if (!text) return fallback;
  try { return JSON.parse(text); } catch { return fallback; }
}

function Fortschrittsbar({ prozent, farbe }) {
  return (
    <div className="bar-track">
      <div className="bar-fill" style={{ width: `${Math.min(100, Math.max(0, prozent))}%`, background: farbe }} />
    </div>
  );
}

function App() {
  const [schuelerId, setSchuelerId] = useState("");
  const [projekt, setProjekt] = useState(null);
  const [bewertungen, setBewertungen] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [geladen, setGeladen] = useState(false);

  const currentSchueler = SCHUELER.find((s) => s.id === schuelerId);
  const istGSE2 = currentSchueler?.klasse === "2GSE";
  const perioden = istGSE2 ? PERIODEN_2GSE : PERIODEN_1GSE;

  useEffect(() => {
    if (!schuelerId) return;
    setLoading(true);
    setError(null);
    setGeladen(false);
    fetch(WEB_APP_URL)
      .then((res) => res.json())
      .then((data) => {
        const alleProjekte = data.projekte || [];
        const meins = alleProjekte.find((p) => p.Schüler === currentSchueler.name);
        setProjekt(meins || null);
        const meineBewertungen = (data.bewertungen || []).filter((b) => b.Schüler === currentSchueler.name);
        setBewertungen(meineBewertungen);
      })
      .catch(() => setError("Konnte Daten nicht laden."))
      .finally(() => { setLoading(false); setGeladen(true); });
  }, [schuelerId]);

  const bewertungFuer = (periode) => bewertungen.find((b) => b.Periode === periode);
  const planDetails = projekt ? sicherJson(projekt["Projektplan-Details (JSON)"], null) : null;

  return (
    <div className="wrap">
      <header className="topbar">
        <div className="brand">
          <span className="brand-mark">PPREN</span>
          <span className="brand-sub">Mäin Suivi · Sciences Environnementales</span>
        </div>
      </header>

      <main className="content">
        <section className="card">
          <label className="field">
            <span className="field-label">Wie bass du?</span>
            <select className="select" value={schuelerId} onChange={(e) => setSchuelerId(e.target.value)}>
              <option value="">– auswählen –</option>
              {SCHUELER.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
          </label>
        </section>

        {loading && <div className="empty">Lädt…</div>}
        {error && <div className="empty error">{error}</div>}

        {geladen && !loading && !error && (
          <>
            {!projekt && (
              <div className="card"><p className="notice">Für dich wurde noch kein Projektplan eingereicht.</p></div>
            )}

            {projekt && (
              <>
                {/* ===== Kapitel 1: Projektplan ===== */}
                <section className="card">
                  <span className="kapitel-label">Kapitel 1</span>
                  <h2>{projekt.Titel || "(noch kein Titel)"}</h2>
                  <p className="status-line">
                    Status: <strong>{projekt.Status}</strong>
                    {" · "}Betreuer/-in: <strong>{projekt.Betreuer}</strong>
                  </p>

                  {planDetails ? (
                    <>
                      <div className="feld-block">
                        <span className="feld-label">Inhalt / Beschreibung</span>
                        <p className="feld-text">{planDetails.inhalt || "–"}</p>
                      </div>
                      <div className="feld-block">
                        <span className="feld-label">Motivation</span>
                        <p className="feld-text">{planDetails.motivation || "–"}</p>
                      </div>
                      <div className="feld-block">
                        <span className="feld-label">Ziele</span>
                        <p className="feld-text">{planDetails.ziele || "–"}</p>
                      </div>
                      <div className="feld-block">
                        <span className="feld-label">Meilensteine</span>
                        {(planDetails.meilensteine || []).length > 0 ? (
                          <ul className="meilenstein-liste">
                            {planDetails.meilensteine.map((m, i) => (
                              <li key={i}><strong>{m.datum || "–"}</strong> — {m.beschreibung}</li>
                            ))}
                          </ul>
                        ) : <p className="feld-text">–</p>}
                      </div>
                      <div className="feld-block">
                        <span className="feld-label">Gruppenarbeit</span>
                        <p className="feld-text">
                          {planDetails.gruppenarbeit ? `Ja, mit ${planDetails.partner || "–"}` : "Nein, Einzelarbeit"}
                        </p>
                        {planDetails.gruppenarbeit && planDetails.aufgabenteilung && (
                          <p className="feld-text feld-text-sub">{planDetails.aufgabenteilung}</p>
                        )}
                      </div>
                      <div className="feld-block">
                        <span className="feld-label">Kostenplan (max. 500 €)</span>
                        {planDetails.kostenplanNoetig && (planDetails.kosten || []).length > 0 ? (
                          <ul className="kosten-liste">
                            {planDetails.kosten.map((k, i) => (
                              <li key={i}>{k.bezeichnung}: <strong>{k.betrag} €</strong></li>
                            ))}
                          </ul>
                        ) : <p className="feld-text">nicht erforderlich</p>}
                      </div>
                    </>
                  ) : (
                    <p className="notice">Details werden geladen, sobald der Projektplan komplett eingereicht ist.</p>
                  )}

                  <div className="link-row">
                    {projekt["Projektplan-Link"] && (
                      <a className="btn btn-ghost" href={projekt["Projektplan-Link"]} target="_blank" rel="noreferrer">📝 Projektplan als Word öffnen</a>
                    )}
                  </div>
                </section>

                {/* ===== Bewertungsperioden ===== */}
                {perioden.map((periode) => {
                  const b = bewertungFuer(periode);
                  const prozent = b ? Math.round((Number(b.Note) / 60) * 100) : 0;
                  const kategorien = b ? sicherJson(b["Kategorien (JSON)"], []) : [];
                  const gruppenBemerkungen = b ? sicherJson(b["Gruppenbemerkungen (JSON)"], []) : [];

                  const gruppiert = {};
                  kategorien.forEach((k) => {
                    const teile = (k.name || "").split(" — ");
                    const gruppe = teile[0];
                    const pos = teile.slice(1).join(" — ") || k.name;
                    if (!gruppiert[gruppe]) gruppiert[gruppe] = [];
                    gruppiert[gruppe].push({ name: pos, punkte: k.punkte, max: k.max });
                  });

                  return (
                    <section className="card" key={periode}>
                      <span className="kapitel-label">{periode}</span>
                      <div className="periode-head">
                        <h2 className="periode-h2">Bewertung &amp; Kommentar</h2>
                        {!b && <span className="pill pill-offen">Nach net bewäert</span>}
                        {b && <span className="pill pill-fertig">Note {b.Note} / 60</span>}
                      </div>

                      {!b && <p className="notice">Fir dës Period läit nach keng Bewertung vir.</p>}

                      {b && (
                        <>
                          <Fortschrittsbar prozent={prozent} farbe={prozent >= 50 ? "#1F5C3B" : "#c0392b"} />
                          <p className="punkte-summe">Gesamt: {b.Punkte} / {b.Max} Punkte</p>

                          {Object.keys(gruppiert).map((gruppe) => {
                            const items = gruppiert[gruppe];
                            const gSumme = items.reduce((s, i) => s + (Number(i.punkte) || 0), 0);
                            const gMax = items.reduce((s, i) => s + (Number(i.max) || 0), 0);
                            const gProzent = gMax > 0 ? Math.round((gSumme / gMax) * 100) : 0;
                            const gBem = gruppenBemerkungen.find((g) => g.titel === gruppe);
                            return (
                              <div className="gruppe-block" key={gruppe}>
                                <div className="gruppe-head">
                                  <span className="gruppe-name">{gruppe}</span>
                                  <span className="gruppe-punkte">{gSumme} / {gMax}</span>
                                </div>
                                <Fortschrittsbar prozent={gProzent} farbe="#3A6EA5" />
                                <ul className="positionen-liste">
                                  {items.map((i, idx) => (
                                    <li key={idx}>{i.name}: <strong>{i.punkte} / {i.max}</strong></li>
                                  ))}
                                </ul>
                                {gBem && (gBem.positiv || []).map((r) => (
                                  <div className="remarque remarque-pos" key={r}>✓ {r}</div>
                                ))}
                                {gBem && (gBem.negativ || []).map((r) => (
                                  <div className="remarque remarque-neg" key={r}>✗ {r}</div>
                                ))}
                                {gBem && gBem.kommentar && <div className="remarque-kommentar">{gBem.kommentar}</div>}
                              </div>
                            );
                          })}

                          {(() => {
                            const allgemein = sicherJson(b["Allgemeine Remarquen (JSON)"], { positiv: [], negativ: [] });
                            const hatAllgemein = (allgemein.positiv || []).length > 0 || (allgemein.negativ || []).length > 0;
                            return hatAllgemein ? (
                              <div className="allgemeine-remarquen">
                                {(allgemein.positiv || []).map((r) => (
                                  <div className="remarque remarque-pos" key={r}>✓ {r}</div>
                                ))}
                                {(allgemein.negativ || []).map((r) => (
                                  <div className="remarque remarque-neg" key={r}>✗ {r}</div>
                                ))}
                              </div>
                            ) : null;
                          })()}

                          {b.Kommentar && (
                            <div className="allgemeiner-kommentar">
                              <span className="ak-label">Kommentar der Lehrperson</span>
                              <p>{b.Kommentar}</p>
                            </div>
                          )}

                          {b["Suivi-PDF-Link (Schüler)"] && (
                            <a className="btn btn-primary" href={b["Suivi-PDF-Link (Schüler)"]} target="_blank" rel="noreferrer">
                              📄 Ganzen Suivi als PDF opmaachen
                            </a>
                          )}
                        </>
                      )}
                    </section>
                  );
                })}
              </>
            )}
          </>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, "Segoe UI", Inter, Arial, sans-serif; color: #1c2621; background: #f6f8f6; }
.topbar { padding: 14px 22px; background: #1F5C3B; color: #fff; }
.brand { display: flex; align-items: baseline; gap: 10px; }
.brand-mark { font-weight: 800; font-size: 15px; letter-spacing: 0.06em; }
.brand-sub { font-size: 13px; opacity: 0.85; }
.content { max-width: 640px; margin: 0 auto; padding: 24px 20px 60px; }
.card { background: #fff; border: 1px solid #e2e8e3; border-radius: 12px; padding: 20px 22px; margin-bottom: 16px; }
.card h2 { font-size: 18px; margin: 2px 0 6px; color: #1F5C3B; }
.kapitel-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #6d7d74; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field-label { font-size: 12.5px; font-weight: 700; color: #294f3c; }
.select { border: 1px solid #c9d5cd; border-radius: 7px; padding: 9px 10px; font-size: 14px; font-family: inherit; background: #fff; width: 100%; }
.status-line { font-size: 13.5px; color: #55625a; margin: 0 0 16px; }
.link-row { display: flex; gap: 10px; margin-top: 16px; }
.btn { display: inline-block; font-size: 13.5px; font-weight: 700; padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; text-decoration: none; }
.btn-primary { background: #1F5C3B; color: #fff; margin-top: 14px; }
.btn-ghost { background: #eef3ef; color: #1F5C3B; }
.notice { background: #fbe8c6; color: #8a5a12; font-size: 13px; padding: 12px 14px; border-radius: 8px; line-height: 1.5; margin: 0; }
.empty { padding: 30px; text-align: center; color: #6d7d74; font-size: 14px; background: #fff; border-radius: 12px; border: 1px solid #e2e8e3; }
.error { color: #8a2b1f; }

.feld-block { margin-bottom: 14px; }
.feld-label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.03em; color: #294f3c; margin-bottom: 4px; }
.feld-text { font-size: 13.5px; line-height: 1.5; margin: 0; white-space: pre-wrap; }
.feld-text-sub { color: #55625a; margin-top: 4px; }
.meilenstein-liste, .kosten-liste, .positionen-liste { margin: 4px 0 0; padding-left: 18px; font-size: 13px; line-height: 1.6; }

.periode-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.periode-h2 { margin: 0 !important; }
.pill { font-size: 11.5px; font-weight: 700; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; }
.pill-offen { background: #e6e9e6; color: #55625a; }
.pill-fertig { background: #d7ecdd; color: #1F5C3B; }

.bar-track { height: 8px; background: #eef1ef; border-radius: 4px; overflow: hidden; margin: 4px 0 10px; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }

.punkte-summe { font-size: 13.5px; font-weight: 700; color: #294f3c; margin: 0 0 16px; }

.gruppe-block { margin-bottom: 18px; padding-bottom: 16px; border-bottom: 1px dashed #eef1ef; }
.gruppe-block:last-of-type { border-bottom: none; }
.gruppe-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
.gruppe-name { font-size: 13.5px; font-weight: 700; color: #1c2621; }
.gruppe-punkte { font-size: 12.5px; color: #6d7d74; }

.remarque { font-size: 12px; margin-top: 8px; line-height: 1.4; }
.remarque-pos { color: #1F5C3B; }
.remarque-neg { color: #99392f; }
.remarque-kommentar { font-size: 12px; font-style: italic; color: #55625a; margin-top: 8px; }

.allgemeine-remarquen { margin-bottom: 12px; padding-top: 10px; border-top: 1px solid #eef1ef; }
.allgemeiner-kommentar { background: #eef3ef; padding: 12px 14px; border-radius: 8px; margin-top: 4px; }
.ak-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.03em; color: #294f3c; }
.allgemeiner-kommentar p { font-size: 13px; margin: 6px 0 0; line-height: 1.5; }
</style>
</body>
</html>
