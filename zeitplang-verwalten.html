<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PPREN Zäitplang verwalten (Prof)</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
  window.addEventListener("error", function (e) {
    document.getElementById("root").innerHTML =
      '<div style="padding:40px;font-family:sans-serif;color:#8a2b1f;white-space:pre-wrap;">' +
      '<h2 style="margin-top:0;">Fehler beim Laden</h2>' +
      (e.message || "Unbekannter Fehler") +
      (e.filename ? "\n\nDatei: " + e.filename + " Zeile " + e.lineno : "") +
      "</div>";
  });
</script>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzfyThho8MevoyfSz7NsQ1YxZJO4E-f61GYYzqZyHACIHzxR3bm7SHCwVUkCBJrAEvJ/exec";

const KATEGORIE_OPTIONEN = ["Event", "Iwwerpréiwung", "Praktesch Phase", "Ofgab"];
const KATEGORIE_FARWEN = { "Event": "#f0ec3a", "Iwwerpréiwung": "#d9d3f5", "Praktesch Phase": "#1ecdc4", "Ofgab": "#a9d92d" };
const KATEGORIE_TEXT = { "Event": "#1c2621", "Iwwerpréiwung": "#1c2621", "Praktesch Phase": "#04342c", "Ofgab": "#1c2621" };

// Lëtzebuerger Schoulvakanzen a Feierdeeg fir d'Schouljoer 2026/2027 (Quell: men.public.lu)
const VAKANZEN_2026_27 = [
  { start: "2026-10-31", end: "2026-11-08", label: "Allerheiligenferien" },
  { start: "2026-12-19", end: "2027-01-03", label: "Chreschtvakanz" },
  { start: "2027-02-06", end: "2027-02-14", label: "Karénervakanz" },
  { start: "2027-03-27", end: "2027-04-11", label: "Ouschterferien" },
  { start: "2027-05-29", end: "2027-06-06", label: "Pengschtferien" },
  { start: "2027-07-16", end: "2027-09-14", label: "Summerferien" },
];
const FEIERDEEG_2026_27 = [
  { datum: "2027-05-01", label: "Gesetzleche Feierdag (1. Mee)" },
  { datum: "2027-05-06", label: "Christi Himmelfahrt" },
  { datum: "2027-06-23", label: "Gebuertsdag Groussherzog" },
];

/** Gëtt de Label vun der Vakanz/dem Feierdag zréck, op deen dëst Datum fällt — oder null. */
function pruefVakanzOderFeierdag(iso) {
  if (!iso) return null;
  const feier = FEIERDEEG_2026_27.find((f) => f.datum === iso);
  if (feier) return feier.label;
  const vakanz = VAKANZEN_2026_27.find((v) => iso >= v.start && iso <= v.end);
  if (vakanz) return vakanz.label;
  return null;
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function App() {
  const [klasse, setKlasse] = useState("1GSE");
  const [meilensteng, setMeilensteng] = useState([]);
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [error, setError] = useState(null);
  const [toast, setToast] = useState(null);
  const dateiInputRef = useRef(null);

  const lade = () => {
    setLoading(true);
    setError(null);
    fetch(WEB_APP_URL)
      .then((res) => res.json())
      .then((data) => {
        const gefiltert = (data.offiziellZaitplang || []).filter((m) => m.Klasse === klasse);
        setMeilensteng(gefiltert.map((m) => ({ id: uid(), datum: m.Datum, titel: m.Titel, kategorie: m.Kategorie || "Event" })));
      })
      .catch(() => setError("Konnte Zäitplang net lueden."))
      .finally(() => setLoading(false));
  };
  useEffect(() => { lade(); }, [klasse]);

  const sortéiert = useMemo(
    () => [...meilensteng].sort((a, b) => (a.datum || "").localeCompare(b.datum || "")),
    [meilensteng]
  );

  const updateZeil = (id, patch) => setMeilensteng((ms) => ms.map((m) => (m.id === id ? { ...m, ...patch } : m)));
  const addZeil = () => setMeilensteng((ms) => [...ms, { id: uid(), datum: "", titel: "", kategorie: "Event" }]);
  const removeZeil = (id) => setMeilensteng((ms) => ms.filter((m) => m.id !== id));

  const speicheren = async () => {
    setSyncing(true);
    setError(null);
    try {
      const res = await fetch(WEB_APP_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ typ: "offiziellZaitplang", klasse, meilensteng: sortéiert.map(({ datum, titel, kategorie }) => ({ datum, titel, kategorie })) }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "Onbekannte Feeler");
      const konflikter = meilensteng.filter((m) => pruefVakanzOderFeierdag(m.datum));
      if (konflikter.length > 0) {
        setToast(`Gespäichert — awer ⚠️ ${konflikter.length} Datum(er) falen op Vakanz/Feierdag (kuck rout markéiert Zeilen).`);
      } else {
        setToast("Gespäichert — gëllt ab elo fir all Schüler an dëser Klass.");
      }
    } catch (e) {
      setError("Konnte net späicheren: " + e.message);
    } finally {
      setSyncing(false);
      setTimeout(() => setToast(null), 6000);
    }
  };

  const excelImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, { type: "binary" });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
        // Erwaart Kolonnen: Datum | Titel | Kategorie (Header-Zeil gëtt iwwersprongen)
        const neier = rows.slice(1).filter((r) => r[0] && r[1]).map((r) => ({
          id: uid(),
          datum: exceldatumZuIso(r[0]),
          titel: String(r[1]),
          kategorie: KATEGORIE_OPTIONEN.includes(r[2]) ? r[2] : "Event",
        }));
        if (neier.length === 0) {
          alert("Keng gülteg Zeilen fonnt. Erwaart Kolonnen: Datum | Titel | Kategorie (mat Header-Zeil).");
          return;
        }
        if (meilensteng.length > 0 && !confirm(neier.length + " Zeilen fonnt. Aktuell Lëscht ersetzen?")) return;
        setMeilensteng(neier);
      } catch (err) {
        alert("Konnte Excel-Datei net liesen: " + err.message);
      }
    };
    reader.readAsBinaryString(file);
    e.target.value = "";
  };

  const exceldatumZuIso = (val) => {
    if (typeof val === "number") {
      const d = XLSX.SSF.parse_date_code(val);
      return `${d.y}-${String(d.m).padStart(2, "0")}-${String(d.d).padStart(2, "0")}`;
    }
    // Probéier "dd.mm.yyyy" oder "dd/mm/yyyy" ze verstoen
    const m = String(val).match(/(\d{1,2})[.\/](\d{1,2})[.\/](\d{4})/);
    if (m) return `${m[3]}-${m[2].padStart(2, "0")}-${m[1].padStart(2, "0")}`;
    return String(val);
  };

  return (
    <div className="wrap">
      <header className="topbar">
        <div className="brand">
          <span className="brand-mark">PPREN</span>
          <span className="brand-sub">🔒 Offiziellen Zäitplang verwalten (nëmmen Proffen)</span>
        </div>
      </header>

      <main className="content">
        <div className="warn">⚠️ Ännerungen hei gëllen automatesch fir <strong>all Schüler</strong> vun der ausgewielter Klass — a bal ze gesinn am Planungstool a Gantt-Chart.</div>

        <section className="card">
          <div className="card-head">
            <div className="klasse-switch">
              <button className={`switch-btn ${klasse === "1GSE" ? "active" : ""}`} onClick={() => setKlasse("1GSE")}>1GSE (Semester)</button>
              <button className={`switch-btn ${klasse === "2GSE" ? "active" : ""}`} onClick={() => setKlasse("2GSE")}>2GSE (Trimester)</button>
            </div>
            <div style={{ display: "flex", gap: "8px" }}>
              <button className="btn-gen" onClick={() => dateiInputRef.current?.click()}>📥 Excel importéieren</button>
              <input type="file" ref={dateiInputRef} accept=".xlsx,.xls,.csv" style={{ display: "none" }} onChange={excelImport} />
            </div>
          </div>
          <p className="hint">Excel-Format: Kolonn A = Datum (dd.mm.yyyy), B = Titel, C = Kategorie ({KATEGORIE_OPTIONEN.join(", ")}). Éischt Zeil = Header, gëtt iwwersprongen.</p>
          <p className="hint">📄 PDF/Bild-Import: aktuell nach net automatesch — Datumer/Titelen mussen manuell iwwerholl oder als Excel virbereet ginn.</p>

          {loading && <p className="notice">Lädt…</p>}
          {error && <p className="notice notice-error">{error}</p>}

          {!loading && (
            <div className="tabelle-wrap">
              <table className="tabelle">
                <thead><tr><th>Datum</th><th>Titel</th><th>Kategorie</th><th></th></tr></thead>
                <tbody>
                  {meilensteng.map((m) => {
                    const konflikt = pruefVakanzOderFeierdag(m.datum);
                    return (
                      <tr key={m.id} className={konflikt ? "zeil-konflikt" : ""}>
                        <td>
                          <input type="date" className="input input-date" value={m.datum} onChange={(e) => updateZeil(m.id, { datum: e.target.value })} />
                          {konflikt && <div className="konflikt-hint">⚠️ {konflikt}</div>}
                        </td>
                        <td><input className="input" value={m.titel} onChange={(e) => updateZeil(m.id, { titel: e.target.value })} /></td>
                      <td>
                        <select className="select status-select" style={{ background: KATEGORIE_FARWEN[m.kategorie], color: KATEGORIE_TEXT[m.kategorie] }} value={m.kategorie} onChange={(e) => updateZeil(m.id, { kategorie: e.target.value })}>
                          {KATEGORIE_OPTIONEN.map((k) => <option key={k} value={k}>{k}</option>)}
                        </select>
                      </td>
                      <td><button className="icon-btn" onClick={() => removeZeil(m.id)}>✕</button></td>
                    </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
          <button className="add-btn" onClick={addZeil}>+ Zeil derbäisetzen</button>
        </section>

        <div className="actions">
          <button className="btn btn-primary" disabled={syncing || loading} onClick={speicheren}>
            {syncing ? "Späichert…" : `💾 Fir ${klasse} späicheren`}
          </button>
        </div>
      </main>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, "Segoe UI", Inter, Arial, sans-serif; color: #1c2621; background: #f6f8f6; }
.topbar { padding: 14px 22px; background: #1c2621; color: #fff; }
.brand { display: flex; align-items: baseline; gap: 10px; }
.brand-mark { font-weight: 800; font-size: 15px; letter-spacing: 0.06em; }
.brand-sub { font-size: 13px; opacity: 0.85; }
.content { max-width: 820px; margin: 0 auto; padding: 24px 20px 60px; }
.warn { background: #fbe8c6; color: #8a5a12; font-size: 12.5px; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; line-height: 1.5; }
.card { background: #fff; border: 1px solid #e2e8e3; border-radius: 12px; padding: 18px 20px; margin-bottom: 16px; }
.card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
.klasse-switch { display: flex; gap: 6px; }
.switch-btn { font-size: 12.5px; font-weight: 700; padding: 8px 14px; border-radius: 8px; border: 1px solid #c9d5cd; background: #fff; color: #55625a; cursor: pointer; }
.switch-btn.active { background: #00A94F; border-color: #00A94F; color: #fff; }
.hint { font-size: 11.5px; color: #93a098; margin: 4px 0; line-height: 1.4; }
.btn-gen { font-size: 11.5px; font-weight: 700; color: #00A94F; background: #eef3ef; border: 1px solid #c9d5cd; padding: 6px 12px; border-radius: 7px; cursor: pointer; }
.notice { background: #fbe8c6; color: #8a5a12; font-size: 12.5px; padding: 10px 14px; border-radius: 8px; margin: 10px 0; }
.notice-error { background: #fbe4e1; color: #99392f; }
.tabelle-wrap { overflow-x: auto; margin-top: 10px; }
.tabelle { width: 100%; border-collapse: collapse; }
.tabelle th { text-align: left; font-size: 11px; text-transform: uppercase; color: #6d7d74; padding: 6px 8px; border-bottom: 1px solid #eef1ef; }
.tabelle td { padding: 5px 8px; border-bottom: 1px solid #f4f6f4; }
.input, .select { border: 1px solid #c9d5cd; border-radius: 7px; padding: 7px 9px; font-size: 13px; font-family: inherit; background: #fff; color: #1c2621; }
.input-date { min-width: 130px; }
.zeil-konflikt { background: #fbe4e1; }
.konflikt-hint { font-size: 10.5px; color: #99392f; font-weight: 700; margin-top: 3px; white-space: nowrap; }
.status-select { font-weight: 700; border: none; }
.icon-btn { border: none; background: transparent; color: #99392f; cursor: pointer; font-size: 13px; width: 24px; height: 24px; border-radius: 6px; }
.add-btn { margin-top: 10px; border: 1px dashed #9db6a7; background: transparent; color: #00A94F; font-size: 12.5px; font-weight: 600; padding: 6px 10px; border-radius: 7px; cursor: pointer; }
.actions { padding: 4px 0 20px; }
.btn { font-size: 13.5px; font-weight: 700; padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; }
.btn-primary { background: #00A94F; color: #fff; }
.btn-primary:disabled { background: #b7c6bd; cursor: not-allowed; }
.toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: #1c2621; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; }
</style>
</body>
</html>
