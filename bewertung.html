<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PPREN Bewertung</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
  window.addEventListener("error", function (e) {
    document.getElementById("root").innerHTML =
      '<div style="padding:40px;font-family:sans-serif;color:#8a2b1f;white-space:pre-wrap;">' +
      '<h2 style="margin-top:0;">Fehler beim Laden</h2>' +
      (e.message || "Unbekannter Fehler") +
      (e.filename ? "\n\nDatei: " + e.filename + " Zeile " + e.lineno : "") +
      "</div>";
  });
</script>
<script type="text/babel">
const { useState, useMemo } = React;

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzfyThho8MevoyfSz7NsQ1YxZJO4E-f61GYYzqZyHACIHzxR3bm7SHCwVUkCBJrAEvJ/exec";

const SCHUELER = [
  { id: "lea_muller", name: "Léa Muller", klasse: "1GSE" },
  { id: "ben_weber", name: "Ben Weber", klasse: "2GSE" },
  { id: "noah_schmit", name: "Noah Schmit", klasse: "1GSE" },
  { id: "mia_reuter", name: "Mia Reuter", klasse: "2GSE" },
  { id: "tom_klein", name: "Tom Klein", klasse: "2GSE" },
];

const PERIODEN_2GSE = ["Trimester 1", "Trimester 2", "Trimester 3"];
const PERIODEN_1GSE = ["Semester 1", "Semester 2"];

/* Positiv-/Negativ-Remarquen, wiederverwendbar je Kategorie-Typ */
const REMARKEN_VORLAGEN = {
  planung: {
    positiv: ["Klar strukturierter, realistischer Projektplan", "Motivation überzeugend dargestellt", "Ziele präzise formuliert", "Aufgabenteilung sinnvoll und ausgewogen"],
    negativ: ["Projektplan unklar/unvollständig", "Motivation wenig überzeugend", "Ziele zu vage formuliert", "Kostenplan fehlt oder unvollständig"],
  },
  umsetzung: {
    positiv: ["Zielsetzungen konsequent verfolgt", "Hohe Autonomie erkennbar", "Guter Fortschritt bei den Prüfterminen gezeigt", "Dokumentation vollständig und gut gegliedert"],
    negativ: ["Zielsetzungen nur teilweise erreicht", "Wenig Eigeninitiative erkennbar", "Fortschritt bei Prüfterminen unzureichend", "Dokumentation lückenhaft"],
  },
  dokumentation: {
    positiv: ["Klare, übersichtliche Struktur", "Sprachlich sehr gelungen", "Quellenangaben vorbildlich vollständig", "Inhaltlich fundiert und korrekt"],
    negativ: ["Struktur unübersichtlich", "Zahlreiche Sprachfehler", "Quellenangaben unvollständig", "Fachliche Fehler vorhanden"],
  },
  methodologie: {
    positiv: ["Sicherer Umgang mit digitalen Werkzeugen", "Sorgfältige, methodische Arbeitsweise", "Recherche vielfältig und relevant", "Termine zuverlässig eingehalten"],
    negativ: ["Unsicherer Umgang mit Software", "Arbeitsweise wenig methodisch", "Recherche einseitig oder wenig relevant", "Termine nicht eingehalten"],
  },
  fachgespraech: {
    positiv: ["Fachbegriffe sicher und korrekt verwendet", "Überzeugende, kompetente Antworten", "Gute Reflexion über eigenes Projekt"],
    negativ: ["Fachbegriffe unsicher verwendet", "Antworten oberflächlich", "Reflexion wenig kritisch/differenziert"],
  },
  praesentation: {
    positiv: ["Präsentation klar strukturiert", "Sicherer, überzeugender Vortrag", "Publikum gut einbezogen", "Fragen souverän beantwortet"],
    negativ: ["Präsentation unstrukturiert", "Vortrag unsicher/monoton", "Publikum kaum einbezogen", "Fragen unsicher beantwortet"],
  },
  sachliche_qualitaet: {
    positiv: ["Produkt funktioniert einwandfrei wie geplant", "Handwerkliche Umsetzung überzeugend", "Film gut umgesetzt"],
    negativ: ["Produkt funktioniert nicht wie geplant", "Handwerkliche Mängel erkennbar", "Film unzureichend umgesetzt"],
  },
};

const STRUKTUR_2GSE = {
  "Trimester 1": {
    offizielleSkala: 270,
    wochenberichte: { max: 60, label: "Wochenberichte (12 × 5P)" },
    gruppen: [
      {
        titel: "Planung / Themenfindung", typ: "planung",
        items: [{ name: "Projektplan", max: 30, indikatoren: "Beschreibung des Projektes (15P); Motivation/Bezug zu Umweltwissenschaften (3P); Ziele (6P); Aufgabenteilung bei Gruppenarbeit (6P); Kostenplan falls erforderlich" }],
      },
      {
        titel: "Umsetzung des Projektes und Dokumentation", typ: "umsetzung",
        items: [
          { name: "Bewältigung des Themas", max: 30, indikatoren: "Arbeit an vereinbarten Zielsetzungen; Zielüberprüfung an 2 Terminen (je 11P); Autonomie (8P)" },
          { name: "Dokumentation", max: 30, indikatoren: "Einleitung, Vorwort, Titelseite, Inhaltsverzeichnis, Verzeichnisse; Recherche/Theorie (20P)" },
        ],
      },
      {
        titel: "Methodologie 1 — Bewerbungsmappe & Praktikumssuche", typ: "methodologie",
        items: [
          { name: "Bewerbungsmappe (FR/DE/EN)", max: 30, indikatoren: "Alle Dokumente vorhanden; Richtlinien für Bewerbungsschreiben/Lebenslauf beachtet" },
          { name: "Überprüfung der erledigten Arbeiten", max: 10, indikatoren: "Methodische, gezielte Kontrolle; Nutzung von Korrekturressourcen; Fehler erkannt und korrigiert" },
          { name: "Praktikumsplatzsuche", max: 20, indikatoren: "Alle Suchmöglichkeiten ausgeschöpft; Termine eingehalten" },
        ],
      },
      {
        titel: "Methodologie 2 — Kommunikation & Recherche", typ: "methodologie",
        items: [
          { name: "Schriftliche Kommunikation per E-Mail", max: 40, indikatoren: "Standardsätze/Höflichkeitsformeln bekannt; passender Wortschatz; korrekte Struktur" },
          { name: "Elektronische Kommunikationsmittel", max: 10, indikatoren: "Modalitäten bekannt und korrekt angewendet; Anweisungen korrekt umgesetzt" },
          { name: "Effiziente Nutzung verschiedener Quellen", max: 10, indikatoren: "Informationsquellen unterschieden und projektrelevant ausgewählt" },
        ],
      },
    ],
  },
  "Trimester 2": {
    offizielleSkala: 190,
    wochenberichte: { max: 40, label: "Meilensteine / Wochenberichte (8 × 5P)" },
    gruppen: [
      {
        titel: "Umsetzung des Projektes und Dokumentation", typ: "umsetzung",
        items: [
          { name: "Bewältigung des Themas", max: 30, indikatoren: "Arbeit an Zielsetzungen; 1–2 Prüftermine; Autonomie" },
          { name: "Dokumentation", max: 30, indikatoren: "Theoretische Grundlagen (25P); Quellenverzeichnis (5P)" },
        ],
      },
      {
        titel: "Fachgespräch", typ: "fachgespraech",
        items: [{ name: "Fachwissen", max: 30, indikatoren: "4 Fragen mit Skizze oder 5 Fragen kompetent & fachlich korrekt beantwortet, Fachbegriffe benutzt" }],
      },
      {
        titel: "Schriftliche Prüfung", typ: "dokumentation",
        items: [{ name: "Schriftliche Prüfung", max: 30, indikatoren: "Vorbereitung auf das schriftliche Examen; Analyse und Reflexion des Projekts" }],
      },
      {
        titel: "Methodologie", typ: "methodologie",
        items: [
          { name: "Digitale Kompetenzen", max: 15, indikatoren: "Beherrschung fortgeschrittener Funktionen der verwendeten Software (MS Office)" },
          { name: "Recherche, Analyse und Dokumentation", max: 15, indikatoren: "Theoretische Grundlagen & Quellenverzeichnis; Vielfalt & Relevanz der Quellen" },
        ],
      },
    ],
  },
  "Trimester 3": {
    offizielleSkala: 300,
    wochenberichte: { max: 60, label: "Meilensteine / Wochenberichte (8–12 × 5P)" },
    gruppen: [
      {
        titel: "Vorgehensweise bei der Umsetzung des Projektes", typ: "umsetzung",
        items: [
          { name: "Bewältigung des Themas", max: 30, indikatoren: "Arbeit an Zielsetzungen; 1–2 Prüftermine; Autonomie (8P)" },
          { name: "Sachliche Qualität", max: 60, indikatoren: "Komponenten/Produkt funktionieren wie geplant (30P); Qualität inkl. Film überzeugt (30P)" },
        ],
      },
      {
        titel: "Schriftliche Arbeit / Dokumentation", typ: "dokumentation",
        items: [
          { name: "Darstellung", max: 8, indikatoren: "Übersichtlich strukturiert & gegliedert; sorgfältiges, kompaktes Layout" },
          { name: "Sprache", max: 7, indikatoren: "Verständlich, flüssig, prägnant; korrekte Grammatik/Satzbau/Rechtschreibung/Zeichensetzung" },
          { name: "Zitate, Quellen, Verzeichnisse", max: 5, indikatoren: "Vollständige Quellenangaben & Verzeichnisse" },
          { name: "Sachliche Qualität", max: 40, indikatoren: "Vollständig, fachlich begründet und korrekt" },
        ],
      },
      {
        titel: "Präsentation", typ: "praesentation",
        items: [
          { name: "Struktur", max: 6, indikatoren: "Durchdacht und ansprechend gestaltet" },
          { name: "Inhalt", max: 12, indikatoren: "Repräsentativ, mit Einblick in Ergebnisse und Produkt" },
          { name: "Sprache", max: 3, indikatoren: "Flüssig, verständlich, korrekt" },
          { name: "Interaktion", max: 3, indikatoren: "Interesse geweckt, Publikum angemessen einbezogen" },
          { name: "Fragen", max: 6, indikatoren: "Kompetent beantwortet" },
        ],
      },
      {
        titel: "Fachgespräch", typ: "fachgespraech",
        items: [
          { name: "Fachwissen", max: 20, indikatoren: "4/5 Fragen kompetent beantwortet, Fachbegriffe benutzt" },
          { name: "Eigenbewertung / Reflexion", max: 10, indikatoren: "Analyse und Reflexion des Projekts" },
        ],
      },
      {
        titel: "Methodologie", typ: "methodologie",
        items: [
          { name: "Vorbereitung und Verwaltung des Projekts", max: 20, indikatoren: "Checkliste vor Abgabe genutzt; Zwischentermine eingehalten" },
          { name: "Teamarbeit (PowerPoint-Präsentation)", max: 10, indikatoren: "Organisation der Notizen; individuelle Beiträge; Koordination/Kommunikation" },
        ],
      },
    ],
  },
};

const STRUKTUR_1GSE = {
  "Semester 1": {
    offizielleSkala: 60,
    wochenberichte: { max: 24, label: "Wochenberichte" },
    gruppen: [
      { titel: "Bewertung (Platzhalter)", typ: "umsetzung", items: [
        { name: "Planung & Themenfindung", max: 20, indikatoren: "Noch kein offizielles Raster hinterlegt." },
        { name: "Methodologie", max: 20, indikatoren: "Noch kein offizielles Raster hinterlegt." },
        { name: "Umsetzung & Dokumentation", max: 20, indikatoren: "Noch kein offizielles Raster hinterlegt." },
      ]},
    ],
  },
  "Semester 2": {
    offizielleSkala: 60,
    wochenberichte: { max: 24, label: "Wochenberichte" },
    gruppen: [
      { titel: "Bewertung (Platzhalter)", typ: "umsetzung", items: [
        { name: "Planung & Themenfindung", max: 20, indikatoren: "Noch kein offizielles Raster hinterlegt." },
        { name: "Methodologie", max: 20, indikatoren: "Noch kein offizielles Raster hinterlegt." },
        { name: "Umsetzung & Dokumentation", max: 20, indikatoren: "Noch kein offizielles Raster hinterlegt." },
      ]},
    ],
  },
};

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function initKategorien(struktur, periode) {
  const def = struktur[periode];
  if (!def) return [];
  const flat = [];
  def.gruppen.forEach((g) => {
    g.items.forEach((item) => {
      flat.push({ id: uid(), gruppe: g.titel, name: item.name, max: item.max, indikatoren: item.indikatoren, punkte: "" });
    });
  });
  return flat;
}

function initGruppenState(struktur, periode) {
  const def = struktur[periode];
  if (!def) return {};
  const state = {};
  def.gruppen.forEach((g) => {
    state[g.titel] = { positiv: [], negativ: [], kommentar: "" };
  });
  return state;
}

function App() {
  const [schuelerId, setSchuelerId] = useState("");
  const [periode, setPeriode] = useState("");
  const [kategorien, setKategorien] = useState([]);
  const [gruppenState, setGruppenState] = useState({});
  const [wbPunkte, setWbPunkte] = useState("");
  const [kommentar, setKommentar] = useState("");
  const [syncing, setSyncing] = useState(false);
  const [syncError, setSyncError] = useState(null);
  const [docUrl, setDocUrl] = useState(null);
  const [toast, setToast] = useState(null);

  const currentSchueler = SCHUELER.find((s) => s.id === schuelerId);
  const istGSE2 = currentSchueler?.klasse === "2GSE";
  const struktur = istGSE2 ? STRUKTUR_2GSE : STRUKTUR_1GSE;
  const perioden = istGSE2 ? PERIODEN_2GSE : PERIODEN_1GSE;
  const def = periode ? struktur[periode] : null;

  const schuelerWaehlen = (id) => {
    setSchuelerId(id);
    setPeriode("");
    setKategorien([]);
    setGruppenState({});
    setWbPunkte("");
    setDocUrl(null);
  };

  const periodeWaehlen = (p) => {
    const s = istGSE2 ? STRUKTUR_2GSE : STRUKTUR_1GSE;
    setPeriode(p);
    setKategorien(initKategorien(s, p));
    setGruppenState(initGruppenState(s, p));
    setWbPunkte("");
    setDocUrl(null);
  };

  const begrenzeAufMax = (wert, max) => {
    if (wert === "") return "";
    const zahl = parseFloat(wert);
    if (isNaN(zahl)) return "";
    if (zahl < 0) return "0";
    if (zahl > max) return String(max);
    return wert;
  };

  const updateKategorie = (id, punkte, max) =>
    setKategorien((ks) => ks.map((k) => (k.id === id ? { ...k, punkte: begrenzeAufMax(punkte, max) } : k)));

  const updateWbPunkte = (punkte) => setWbPunkte(begrenzeAufMax(punkte, wbMax));

  const toggleRemarque = (gruppe, art, text) => {
    setGruppenState((gs) => {
      const bestehend = gs[gruppe] || { positiv: [], negativ: [], kommentar: "" };
      const liste = bestehend[art];
      const neueListe = liste.includes(text) ? liste.filter((t) => t !== text) : [...liste, text];
      return { ...gs, [gruppe]: { ...bestehend, [art]: neueListe } };
    });
  };

  const setGruppenKommentar = (gruppe, text) => {
    setGruppenState((gs) => ({ ...gs, [gruppe]: { ...(gs[gruppe] || { positiv: [], negativ: [] }), kommentar: text } }));
  };

  const gruppiert = useMemo(() => {
    const map = {};
    kategorien.forEach((k) => {
      if (!map[k.gruppe]) map[k.gruppe] = [];
      map[k.gruppe].push(k);
    });
    return map;
  }, [kategorien]);

  const kategorienSumme = kategorien.reduce((s, k) => s + (parseFloat(k.punkte) || 0), 0);
  const kategorienMax = kategorien.reduce((s, k) => s + k.max, 0);
  const wbMax = def?.wochenberichte?.max || 0;
  const gesamt = kategorienSumme + (parseFloat(wbPunkte) || 0);
  const gesamtMax = kategorienMax + wbMax;
  const offizielleSkala = def?.offizielleSkala || gesamtMax;
  const note = offizielleSkala > 0 ? Math.round((gesamt * 60 / offizielleSkala) * 10) / 10 : null;
  const abweichung = gesamtMax !== offizielleSkala;

  const canSubmit = schuelerId && periode && kategorien.every((k) => k.punkte !== "") && wbPunkte !== "";

  const absenden = async () => {
    setSyncing(true);
    setSyncError(null);
    try {
      const gruppenBemerkungen = (def?.gruppen || []).map((g) => ({
        titel: g.titel,
        positiv: gruppenState[g.titel]?.positiv || [],
        negativ: gruppenState[g.titel]?.negativ || [],
        kommentar: gruppenState[g.titel]?.kommentar || "",
      }));

      const payload = {
        typ: "bewertung",
        schueler: currentSchueler.name,
        klasse: currentSchueler.klasse,
        periode,
        kategorien: kategorien.map((k) => ({ name: `${k.gruppe} — ${k.name}`, punkte: Number(k.punkte) || 0, max: k.max })),
        gruppenBemerkungen,
        wochenberichtePunkte: Number(wbPunkte) || 0,
        wochenberichteMax: wbMax,
        wochenberichteLabel: def?.wochenberichte?.label,
        noteBerechnet: note,
        kommentar,
      };
      const res = await fetch(WEB_APP_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "Unbekannter Fehler");
      setDocUrl(data.url);
      setToast("Bewertung gespeichert und ins Suivi übernommen.");
    } catch (e) {
      setSyncError("Konnte nicht speichern: " + e.message);
    } finally {
      setSyncing(false);
      setTimeout(() => setToast(null), 3600);
    }
  };

  return (
    <div className="wrap">
      <header className="topbar">
        <div className="brand">
          <span className="brand-mark">PPREN</span>
          <span className="brand-sub">Bewertung · Sciences Environnementales</span>
        </div>
      </header>

      <main className="content">
        <section className="card">
          <h2>1. Schüler/-in & Periode</h2>
          <div className="grid2">
            <label className="field">
              <span className="field-label">Schüler/-in</span>
              <select className="select" value={schuelerId} onChange={(e) => schuelerWaehlen(e.target.value)}>
                <option value="">– auswählen –</option>
                {SCHUELER.map((s) => <option key={s.id} value={s.id}>{s.name} ({s.klasse})</option>)}
              </select>
            </label>
            <label className="field">
              <span className="field-label">Periode</span>
              <select className="select" value={periode} onChange={(e) => periodeWaehlen(e.target.value)} disabled={!schuelerId}>
                <option value="">– auswählen –</option>
                {perioden.map((p) => <option key={p} value={p}>{p}</option>)}
              </select>
            </label>
          </div>
          {schuelerId && !istGSE2 && (
            <p className="notice">1GSE: Noch kein offizielles Bewertungsraster hinterlegt — Platzhalter-Kategorien.</p>
          )}
        </section>

        {def && (
          <>
            {def.gruppen.map((g) => {
              const vorlage = REMARKEN_VORLAGEN[g.typ] || { positiv: [], negativ: [] };
              const gState = gruppenState[g.titel] || { positiv: [], negativ: [], kommentar: "" };
              return (
                <section className="card" key={g.titel}>
                  <h2>{g.titel}</h2>

                  {(gruppiert[g.titel] || []).map((k) => (
                    <div className="item-block" key={k.id}>
                      <div className="kat-row">
                        <span className="kat-name">{k.name}</span>
                        <input
                          type="number" min="0" max={k.max} className="input input-points"
                          value={k.punkte} onChange={(e) => updateKategorie(k.id, e.target.value, k.max)}
                        />
                        <span className="kat-max">/ {k.max}</span>
                      </div>
                      {k.indikatoren && <div className="indikatoren">{k.indikatoren}</div>}
                    </div>
                  ))}

                  <div className="remarken-block">
                    <div className="remarken-col">
                      <span className="remarken-label remarken-label-pos">✓ Positive Remarquen</span>
                      {(vorlage.positiv || []).map((r) => (
                        <label className="remarque-check" key={r}>
                          <input type="checkbox" checked={gState.positiv.includes(r)} onChange={() => toggleRemarque(g.titel, "positiv", r)} />
                          <span>{r}</span>
                        </label>
                      ))}
                    </div>
                    <div className="remarken-col">
                      <span className="remarken-label remarken-label-neg">✗ Negative Remarquen</span>
                      {(vorlage.negativ || []).map((r) => (
                        <label className="remarque-check" key={r}>
                          <input type="checkbox" checked={gState.negativ.includes(r)} onChange={() => toggleRemarque(g.titel, "negativ", r)} />
                          <span>{r}</span>
                        </label>
                      ))}
                    </div>
                  </div>

                  <textarea
                    className="textarea gruppen-kommentar"
                    rows={2}
                    placeholder={`Zusätzlicher Kommentar zu „${g.titel}“ (optional)…`}
                    value={gState.kommentar}
                    onChange={(e) => setGruppenKommentar(g.titel, e.target.value)}
                  />
                </section>
              );
            })}

            <section className="card">
              <h2>{def.wochenberichte.label}</h2>
              <div className="kat-row">
                <span className="kat-name">Punkte (automatisch aus M5, hier zur Demo manuell)</span>
                <input type="number" min="0" max={def.wochenberichte.max} className="input input-points" value={wbPunkte} onChange={(e) => updateWbPunkte(e.target.value)} />
                <span className="kat-max">/ {def.wochenberichte.max}</span>
              </div>
            </section>

            <section className="card summary-card">
              <div className="total-row">
                <span>Summe eingegeben: {gesamt} / {gesamtMax} Punkte</span>
              </div>
              {abweichung && (
                <p className="notice">
                  Hinweis: Die Summe der Einzelpositionen ({gesamtMax}P) weicht von der im Originaldokument
                  angegebenen Gesamtskala ({offizielleSkala}P) ab — Unstimmigkeit im offiziellen Bewertungsbogen
                  selbst. Die Note wird auf Basis der offiziellen Skala ({offizielleSkala}P → 60P) berechnet.
                </p>
              )}
              {note !== null && (
                <div className="note-row">
                  <span className="note-pill">Note: {note} / 60</span>
                  <span className="note-hint">berechnet aus {gesamt} / {offizielleSkala} (offizielle Skala)</span>
                </div>
              )}
            </section>

            <section className="card">
              <h2>Allgemeiner Kommentar (Zusammenfassung)</h2>
              <textarea className="textarea" rows={4} placeholder="Zusammenfassender Kommentar zur Bewertung dieser Periode…" value={kommentar} onChange={(e) => setKommentar(e.target.value)} />
            </section>

            <div className="actions">
              <button className="btn btn-primary" disabled={!canSubmit || syncing} onClick={absenden}>
                {syncing ? "Speichert…" : "Bewertung ins Suivi übernehmen"}
              </button>
              {docUrl && <a className="doc-link" href={docUrl} target="_blank" rel="noreferrer">📄 Suivi öffnen ↗</a>}
            </div>
            {syncError && <div className="sync-error">{syncError}</div>}
          </>
        )}
      </main>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
