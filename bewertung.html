function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function initKategorien(struktur, periode) {
  const def = struktur[periode];
  if (!def) return [];
  const flat = [];
  def.gruppen.forEach((g) => {
    g.items.forEach((item) => {
      flat.push({ id: uid(), gruppe: g.titel, name: item.name, max: item.max, indikatoren: item.indikatoren, punkte: "" });
    });
  });
  return flat;
}

function initGruppenState(struktur, periode) {
  const def = struktur[periode];
  if (!def) return {};
  const state = {};
  def.gruppen.forEach((g) => {
    state[g.titel] = { auswahl: {}, kommentar: "" };
  });
  return state;
}

/* Wandelt eine Themen-Auswahl { thema: "pos"|"neg" } anhand der Vorlage
   in zwei Textlisten (positiv/negativ) um. */
function auswahlZuListen(vorlage, auswahl) {
  const positiv = [];
  const negativ = [];
  (vorlage || []).forEach((item) => {
    const wert = auswahl[item.thema];
    if (wert === "pos") positiv.push(item.positiv);
    else if (wert === "neg") negativ.push(item.negativ);
  });
  return { positiv, negativ };
}

    try {
      const res = await fetch(WEB_APP_URL);
      const data = await res.json();
      const bestehend = (data.bewertungen || []).find((b) => b.Schüler === schuelerName && b.Periode === p);
      if (bestehend && bestehend.Status === "Finalisiert") {
        setFinalisiert(true);
      }
      // Wochenberichter-Punkte automatesch aus de bewäerte Berichter zéien
      const meng = (data.wochenberichte || []).filter((w) => w.Schüler === schuelerName && w.Periode === p);
      let summe = 0, anzahl = 0;
      meng.forEach((w) => {
        if (w.Status === "Bewäert") {
          try {
            const pk = JSON.parse(w["Punkte (JSON)"]);
            summe += (pk.zusammenfassung || 0) + (pk.fortschritt || 0) + (pk.anhaenge || 0) + (pk.grammatik || 0);
            anzahl++;
          } catch {}
        }
      });
      setWbAuto({ summe, max: anzahl * 5, anzahl });
      setWbPunkte(String(summe));

      // Fachgespréich-Punkte automatesch aus dem Fachgespraech-Tool zéien
      const fgTreffer = (data.fachgespraeche || [])
        .filter((f) => f.Schüler === schuelerName && f.Periode === p)
        .sort((a, b) => (a["Zuletzt aktualisiert"] || "").localeCompare(b["Zuletzt aktualisiert"] || ""));
      const fgLetzt = fgTreffer[fgTreffer.length - 1];
      if (fgLetzt) {
        setKategorien((ks) => {
          const fgItems = ks.filter((k) => k.gruppe === "Fachgespräch");
          if (fgItems.length === 0) return ks;
          return ks.map((k) => {
            if (k.gruppe !== "Fachgespräch") return k;
            if (fgItems.length === 1) {
              // Nëmmen Fachwëssen (max 30): kompletten Gesamt-Wäert
              return { ...k, punkte: String(fgLetzt.Gesamt ?? "") };
            }
            // Opgedeelt: Fachwëssen + Eegebewäertung/Reflexioun
            if (k.name === "Fachwissen") return { ...k, punkte: String(fgLetzt["Fachwissen-Punkte"] ?? "") };
            if (k.name.startsWith("Eigenbewertung")) return { ...k, punkte: String(fgLetzt["Reflexioun-Punkte"] ?? "") };
            return k;
          });
        });
        setFgInfo({ datum: fgLetzt.Datum, variante: fgLetzt.Variante });
      } else {
        setFgInfo(null);
      }

      // Ziel-Iwwerpréiwung-Punkten automatesch an "Bewältigung des Themas" zéien
      // (deckt just d'Prüftermine of, Autonomie muss d'Prof bäi Bedarf dobäi addéieren)
      const zpTreffer = (data.zieluewerpreiwungen || []).filter((z) => z.Schüler === schuelerName && z.Periode === p);
      if (zpTreffer.length > 0) {
        const zpSumme = zpTreffer.reduce((s, z) => s + (Number(z.Punkte) || 0), 0);
        setKategorien((ks) => ks.map((k) => (k.name === "Bewältigung des Themas" ? { ...k, punkte: String(zpSumme) } : k)));
        setZpInfo({ anzuel: zpTreffer.length, summe: zpSumme });
      } else {
        setZpInfo(null);
      }
    } catch (e) {
      // Prüfung fehlgeschlagen: im Zweifel nicht sperren, Formulaire bleibt normal nutzbar
    } finally {
      setPruefeLaden(false);
    }
  };

  const begrenzeAufMax = (wert, max) => {
    if (wert === "") return "";
    const zahl = parseFloat(wert);
    if (isNaN(zahl)) return "";
    if (zahl < 0) return "0";
    if (zahl > max) return String(max);
    return wert;
  };

  const updateKategorie = (id, punkte, max) =>
    setKategorien((ks) => ks.map((k) => (k.id === id ? { ...k, punkte: begrenzeAufMax(punkte, max) } : k)));

  const toggleGruppenAuswahl = (gruppe, thema, wert) => {
    setGruppenState((gs) => {
      const bestehend = gs[gruppe] || { auswahl: {}, kommentar: "" };
      const aktuell = bestehend.auswahl[thema];
      const neueAuswahl = { ...bestehend.auswahl };
      if (aktuell === wert) {
        delete neueAuswahl[thema];
      } else {
        neueAuswahl[thema] = wert;
      }
      return { ...gs, [gruppe]: { ...bestehend, auswahl: neueAuswahl } };
    });
  };

  const toggleAllgemeinAuswahl = (thema, wert) => {
    setAllgemeinAuswahl((auswahl) => {
      const neueAuswahl = { ...auswahl };
      if (auswahl[thema] === wert) {
        delete neueAuswahl[thema];
      } else {
        neueAuswahl[thema] = wert;
      }
      return neueAuswahl;
    });
  };

  const setGruppenKommentar = (gruppe, text) => {
    setGruppenState((gs) => ({ ...gs, [gruppe]: { ...(gs[gruppe] || { auswahl: {} }), kommentar: text } }));
  };

  const vornameSchueler = () => (currentSchueler?.name || "").split(" ")[0] || "";

  const formuliereAusRemarquen = (vorname, positiv, negativ) => {
    const teile = [];
    if (positiv.length > 0) {
      teile.push(`${vorname} zeigte: ${positiv.join("; ")}.`);
    }
    if (negativ.length > 0) {
      teile.push(`Verbesserungspotenzial: ${negativ.join("; ")}.`);
    }
    return teile.join(" ");
  };

  const generiereGruppenKommentar = (gruppe, typ) => {
    const vorlage = REMARKEN_VORLAGEN[typ] || [];
    const gState = gruppenState[gruppe] || { auswahl: {} };
    const { positiv, negativ } = auswahlZuListen(vorlage, gState.auswahl || {});
    const text = formuliereAusRemarquen(vornameSchueler(), positiv, negativ);
    setGruppenKommentar(gruppe, text);
  };

  const generiereAllgemeinKommentar = () => {
    const { positiv: allePositiv, negativ: alleNegativ } = auswahlZuListen(ALLGEMEINE_REMARKEN, allgemeinAuswahl);
    (def?.gruppen || []).forEach((g) => {
      const vorlage = REMARKEN_VORLAGEN[g.typ] || [];
      const gState = gruppenState[g.titel] || { auswahl: {} };
      const { positiv, negativ } = auswahlZuListen(vorlage, gState.auswahl || {});
      allePositiv.push(...positiv);
      alleNegativ.push(...negativ);
    });
    const text = formuliereAusRemarquen(vornameSchueler(), allePositiv, alleNegativ);
    setKommentar(text);
  };

  const gruppiert = useMemo(() => {
    const map = {};
    kategorien.forEach((k) => {
      if (!map[k.gruppe]) map[k.gruppe] = [];
      map[k.gruppe].push(k);
    });
    return map;
  }, [kategorien]);

  const kategorienSumme = kategorien.reduce((s, k) => s + (parseFloat(k.punkte) || 0), 0);
  const kategorienMax = kategorien.reduce((s, k) => s + k.max, 0);
  const wbMax = wbAuto.max;
  const gesamt = kategorienSumme + (parseFloat(wbPunkte) || 0);
  const gesamtMax = kategorienMax + wbMax;
  // Offiziell Skala passt sech un déi tatsächlech bewäert Zuel Wochenberichter un
  // (z. B. 2GSE Trimester 3 mat wéineg/kenge Berichter méi → méi kleng Skala)
  const offizielleSkala = def ? (def.offizielleSkala - def.wochenberichte.max) + wbMax : gesamtMax;
  const note = offizielleSkala > 0 ? Math.round((gesamt * 60 / offizielleSkala) * 10) / 10 : null;
  const abweichung = gesamtMax !== offizielleSkala;

  const canSubmit = schuelerId && periode && kategorien.every((k) => k.punkte !== "") && wbPunkte !== "";

  const absenden = async (finalisieren) => {
    setSyncing(true);
    setSyncError(null);
    try {
      const gruppenBemerkungen = (def?.gruppen || []).map((g) => {
        const vorlage = REMARKEN_VORLAGEN[g.typ] || [];
        const { positiv, negativ } = auswahlZuListen(vorlage, gruppenState[g.titel]?.auswahl || {});
        return {
          titel: g.titel,
          positiv,
          negativ,
          kommentar: gruppenState[g.titel]?.kommentar || "",
        };
      });
      const { positiv: allgemeinPositivListe, negativ: allgemeinNegativListe } = auswahlZuListen(ALLGEMEINE_REMARKEN, allgemeinAuswahl);

      const payload = {
        typ: "bewertung",
        schueler: currentSchueler.name,
        klasse: currentSchueler.klasse,
        periode,
        kategorien: kategorien.map((k) => ({ name: `${k.gruppe} — ${k.name}`, punkte: Number(k.punkte) || 0, max: k.max })),
        gruppenBemerkungen,
        allgemeinPositiv: allgemeinPositivListe,
        allgemeinNegativ: allgemeinNegativListe,
        wochenberichtePunkte: Number(wbPunkte) || 0,
        wochenberichteMax: wbMax,
        wochenberichteLabel: def?.wochenberichte?.label,
        noteBerechnet: note,
        kommentar,
        finalisiert: !!finalisieren,
      };
      const res = await fetch(WEB_APP_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "Unbekannter Fehler");
      setDocUrl(data.url);
      if (finalisieren) {
        setFinalisiert(true);
        setToast("Bewertung finalisiert und gesperrt.");
      } else {
        setToast("Bewertung gespeichert und ins Suivi übernommen.");
      }
    } catch (e) {
      setSyncError("Konnte nicht speichern: " + e.message);
    } finally {
      setSyncing(false);
      setTimeout(() => setToast(null), 3600);
    }
  };

  return (
    <div className="wrap">
      <header className="topbar">
        <div className="brand">
          <span className="brand-mark">PPREN</span>
          <span className="brand-sub">Bewertung · Sciences Environnementales</span>
        </div>
      </header>

      <main className="content">
        <section className="card">
          <h2>1. Schüler/-in & Periode</h2>
          <div className="grid2">
            <label className="field">
              <span className="field-label">Schüler/-in</span>
              <select className="select" value={schuelerId} onChange={(e) => schuelerWaehlen(e.target.value)}>
                <option value="">– auswählen –</option>
                {SCHUELER.map((s) => <option key={s.id} value={s.id}>{s.name} ({s.klasse})</option>)}
              </select>
            </label>
            <label className="field">
              <span className="field-label">Periode</span>
              <select className="select" value={periode} onChange={(e) => periodeWaehlen(e.target.value)} disabled={!schuelerId}>
                <option value="">– auswählen –</option>
                {perioden.map((p) => <option key={p} value={p}>{p}</option>)}
              </select>
            </label>
          </div>
        </section>

        {periode && pruefeLaden && (
          <div className="card"><p className="notice">Prüfe, ob diese Bewertung bereits finalisiert ist…</p></div>
        )}

        {def && finalisiert && !pruefeLaden && (
          <div className="card">
            <p className="notice">
              🔒 Diese Bewertung ({periode}) ist bereits <strong>finalisiert</strong> und gesperrt — sie kann hier nicht
              mehr geändert werden. Zum erneuten Öffnen muss die Betreuer/-in in der Übersicht-Sheet (Tab „Bewertungen“)
              die Status-Spalte für diese Zeile von „Finalisiert“ auf „Entwurf“ ändern.
            </p>
          </div>
        )}

        {def && !finalisiert && !pruefeLaden && (
          <>
            {def.gruppen.map((g) => {
              const vorlage = REMARKEN_VORLAGEN[g.typ] || [];
              const gState = gruppenState[g.titel] || { auswahl: {}, kommentar: "" };
              return (
                <section className="card" key={g.titel}>
                  <div className="card-head-row">
                    <h2>{g.titel}</h2>
                    {g.typ === "fachgespraech" && (
                      <a className="btn-gen" href="fachgespraech.html" target="_blank">🗣️ Fachgespréich-Tool →</a>
                    )}
                  </div>
                  {g.typ === "fachgespraech" && fgInfo && (
                    <p className="notice notice-success">✅ Automatesch iwwerholl aus dem Fachgespréich-Tool ({fgInfo.datum}, Variante {fgInfo.variante}). Bäi Bedarf hei nach upassen.</p>
                  )}
                  {g.typ === "fachgespraech" && !fgInfo && (
                    <p className="notice">ℹ️ Nach kee gespäichert Fachgespréich fonnt fir dës Period — manuell aginn oder éischt am Fachgespréich-Tool ausfëllen.</p>
                  )}
                  {(gruppiert[g.titel] || []).some((k) => k.name === "Bewältigung des Themas") && (
                    <div className="card-head-row">
                      <span></span>
                      <a className="btn-gen" href="zieluewerpreiwung.html" target="_blank">🗣️ Ziler-iwwerpréiwen-Tool →</a>
                    </div>
                  )}
                  {(gruppiert[g.titel] || []).some((k) => k.name === "Bewältigung des Themas") && zpInfo && (
                    <p className="notice notice-success">✅ {zpInfo.summe}P automatesch aus {zpInfo.anzuel} Ziel-Iwwerpréiwung(en) iwwerholl fir "Bewältigung des Themas" — Autonomie-Undeel bäi Bedarf nach dobäi addéieren.</p>
                  )}
                  {(gruppiert[g.titel] || []).some((k) => k.name === "Bewältigung des Themas") && !zpInfo && (
                    <p className="notice">ℹ️ Nach keng Ziel-Iwwerpréiwung fir dës Period gespäichert — manuell aginn oder éischt am Ziler-iwwerpréiwen-Tool ausfëllen.</p>
                  )}

                  {(gruppiert[g.titel] || []).map((k) => (
                    <div className="item-block" key={k.id}>
                      <div className="kat-row">
                        <span className="kat-name">{k.name}</span>
                        <input
                          type="number" min="0" max={k.max} className="input input-points"
                          value={k.punkte} onChange={(e) => updateKategorie(k.id, e.target.value, k.max)}
                        />
                        <span className="kat-max">/ {k.max}</span>
                      </div>
                      {k.indikatoren && <div className="indikatoren">{k.indikatoren}</div>}
                    </div>
                  ))}

                  <div className="remarken-themen">
                    {vorlage.map((item) => {
                      const gewaehlt = gState.auswahl[item.thema];
                      return (
                        <div className="remarque-row" key={item.thema}>
                          <button
                            type="button"
                            className={`remarque-btn remarque-btn-pos ${gewaehlt === "pos" ? "active" : ""}`}
                            onClick={() => toggleGruppenAuswahl(g.titel, item.thema, "pos")}
                          >
                            ✓ {item.positiv}
                          </button>
                          <button
                            type="button"
                            className={`remarque-btn remarque-btn-neg ${gewaehlt === "neg" ? "active" : ""}`}
                            onClick={() => toggleGruppenAuswahl(g.titel, item.thema, "neg")}
                          >
                            ✗ {item.negativ}
                          </button>
                        </div>
                      );
                    })}
                  </div>

                  <div className="kommentar-gen-row">
                    <button type="button" className="btn-gen" onClick={() => generiereGruppenKommentar(g.titel, g.typ)}>
                      🖊️ Kommentar aus Remarquen generéieren
                    </button>
                  </div>
                  <textarea
                    className="textarea gruppen-kommentar"
                    rows={2}
                    placeholder={`Zusätzlicher Kommentar zu „${g.titel}“ (optional)…`}
                    value={gState.kommentar}
                    onChange={(e) => setGruppenKommentar(g.titel, e.target.value)}
                  />
                </section>
              );
            })}

            <section className="card">
              <div className="card-head-row">
                <h2>{def.wochenberichte.label}</h2>
                <a className="btn-gen" href="wochenberichte-korrigeieren.html" target="_blank">📋 Wochenberichter korrigéieren →</a>
              </div>
              <div className="kat-row">
                <span className="kat-name">Punkte (automatesch aus {wbAuto.anzahl} bewäerte Wochenberichter)</span>
                <span className="wb-auto-wert">{wbAuto.summe}</span>
                <span className="kat-max">/ {wbMax}</span>
              </div>
              {wbAuto.anzahl === 0 && (
                <p className="notice">Nach keng Wochenberichter fir dës Period bewäert — d'Skala pass sech automatesch un (relevant z. B. fir 2GSE Trimester 3, wou et keng méi gëtt).</p>
              )}
            </section>

            <section className="card summary-card">
              <div className="total-row">
                <span>Summe eingegeben: {gesamt} / {gesamtMax} Punkte</span>
              </div>
              {abweichung && (
                <p className="notice">
                  Hinweis: Die Summe der Einzelpositionen ({gesamtMax}P) weicht von der im Originaldokument
                  angegebenen Gesamtskala ({offizielleSkala}P) ab — Unstimmigkeit im offiziellen Bewertungsbogen
                  selbst. Die Note wird auf Basis der offiziellen Skala ({offizielleSkala}P → 60P) berechnet.
                </p>
              )}
              {note !== null && (
                <div className="note-row">
                  <span className="note-pill">Note: {note} / 60</span>
                  <span className="note-hint">berechnet aus {gesamt} / {offizielleSkala} (offizielle Skala)</span>
                </div>
              )}
            </section>

            <section className="card">
              <h2>Allgemeiner Kommentar (Zusammenfassung)</h2>
              <div className="remarken-themen">
                {ALLGEMEINE_REMARKEN.map((item) => {
                  const gewaehlt = allgemeinAuswahl[item.thema];
                  return (
                    <div className="remarque-row" key={item.thema}>
                      <button
                        type="button"
                        className={`remarque-btn remarque-btn-pos ${gewaehlt === "pos" ? "active" : ""}`}
                        onClick={() => toggleAllgemeinAuswahl(item.thema, "pos")}
                      >
                        ✓ {item.positiv}
                      </button>
                      <button
                        type="button"
                        className={`remarque-btn remarque-btn-neg ${gewaehlt === "neg" ? "active" : ""}`}
                        onClick={() => toggleAllgemeinAuswahl(item.thema, "neg")}
                      >
                        ✗ {item.negativ}
                      </button>
                    </div>
                  );
                })}
              </div>
              <div className="kommentar-gen-row">
                <button type="button" className="btn-gen" onClick={generiereAllgemeinKommentar}>
                  🖊️ Gesamtkommentar aus allen Remarquen generéieren
                </button>
              </div>
              <textarea className="textarea gruppen-kommentar" rows={4} placeholder="Zusätzlicher freier Kommentar (optional)…" value={kommentar} onChange={(e) => setKommentar(e.target.value)} />
            </section>

            <div className="actions">
              <button className="btn btn-ghost" disabled={!canSubmit || syncing} onClick={() => absenden(false)}>
                {syncing ? "Speichert…" : "💾 Speichern (Entwurf)"}
              </button>
              <button className="btn btn-primary" disabled={!canSubmit || syncing} onClick={() => absenden(true)}>
                {syncing ? "Speichert…" : "✅ Finaliséieren"}
              </button>
              {docUrl && <a className="doc-link" href={docUrl} target="_blank" rel="noreferrer">📄 Suivi öffnen ↗</a>}
            </div>
            {syncError && <div className="sync-error">{syncError}</div>}
          </>
        )}
      </main>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
